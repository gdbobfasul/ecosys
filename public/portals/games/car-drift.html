<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Кола — Дрифт | KCY игри</title>
<style>
  body{margin:0;background:#0a1018;color:#fff;font-family:system-ui;text-align:center}
  .top{padding:12px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
  .top a{background:#1d2b3a;color:#9cc4e0;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.9em}
  canvas{display:block;margin:0 auto;border-radius:12px;max-width:100%;box-shadow:0 10px 40px rgba(0,0,0,.5)}
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0094">
</head>
<body>
<div class="top">
  <a href="/portals/games/">← Всички игри</a>
  <a href="/portals/games/?rank=1">🏆 Ранг листа</a>
</div>
<canvas id="cv" width="440" height="600"></canvas>
<script src="/portals/games/game-engine.js"></script>
<script>
var car, items, dash, roadX, roadW;

function init(eng, level){
  roadW=320; roadX=(eng.W-roadW)/2;
  car={x:eng.W/2,y:eng.H-110,w:40,h:70,vx:0,tilt:0};
  items=[]; dash=0;
  eng._coins=0;
  eng._need=6+level*2;       // монети за ниво
  eng._speed=3.2+level*0.5;
  eng._spawnCd=20;
}

function update(eng,dt){
  var acc=0;
  if(eng.keys['ArrowLeft']||eng.keys['KeyA']) acc=-0.9;
  if(eng.keys['ArrowRight']||eng.keys['KeyD']) acc=0.9;
  car.vx+=acc*dt; car.vx*=0.9;
  car.x+=car.vx*dt;
  car.tilt+=((car.vx*0.05)-car.tilt)*0.2;
  if(car.x<roadX+car.w/2){car.x=roadX+car.w/2;car.vx=0;}
  if(car.x>roadX+roadW-car.w/2){car.x=roadX+roadW-car.w/2;car.vx=0;}

  if(Math.abs(car.vx)>1) eng.trail(car.x,car.y+car.h/2,'rgba(60,60,60,.5)');

  dash+=eng._speed*dt;
  eng._spawnCd-=dt;
  if(eng._spawnCd<=0){
    var isCoin=Math.random()<0.55;
    items.push({x:roadX+24+Math.random()*(roadW-48),y:-30,coin:isCoin,r:isCoin?13:0,w:30,h:34});
    eng._spawnCd=Math.max(14,34-eng.level*1.6);
  }
  for(var i=items.length-1;i>=0;i--){
    var it=items[i];
    it.y+=eng._speed*dt;
    var dx=it.x-car.x, dy=it.y-car.y;
    if(it.coin){
      if(dx*dx+dy*dy<(it.r+22)*(it.r+22)){
        items.splice(i,1); eng._coins++; eng.score+=50;
        eng.burst(it.x,it.y,'#ffd24a',14);
        continue;
      }
    } else {
      var a={x:car.x-car.w/2,y:car.y-car.h/2,w:car.w,h:car.h};
      var b={x:it.x-it.w/2,y:it.y-it.h/2,w:it.w,h:it.h};
      if(eng.rectHit(a,b)) return 'dead';
    }
    if(it.y>eng.H+40) items.splice(i,1);
  }
  if(eng._coins>=eng._need) return 'next';
  return null;
}

function background(eng,ctx){
  ctx.fillStyle='#3a2e22'; ctx.fillRect(0,0,eng.W,eng.H);
  ctx.fillStyle='#23304a'; ctx.fillRect(roadX,0,roadW,eng.H);
  ctx.fillStyle='#e8c84a';
  ctx.fillRect(roadX-3,0,3,eng.H); ctx.fillRect(roadX+roadW,0,3,eng.H);
  ctx.fillStyle='rgba(255,255,255,.5)';
  for(var d=0;d<16;d++){ var y=((d*56+dash)%eng.H)-28; ctx.fillRect(eng.W/2-2,y,4,30); }
}

function draw(eng,ctx){
  for(var i=0;i<items.length;i++){
    var it=items[i];
    if(it.coin){
      ctx.save(); ctx.translate(it.x,it.y);
      var g=ctx.createRadialGradient(-3,-3,2,0,0,it.r);
      g.addColorStop(0,'#fff3a0'); g.addColorStop(1,'#e0a020');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,it.r,0,7); ctx.fill();
      ctx.strokeStyle='#fff3a0'; ctx.lineWidth=2; ctx.stroke();
      ctx.restore();
    } else {
      // конус
      ctx.save(); ctx.translate(it.x,it.y);
      ctx.fillStyle='#e8612c';
      ctx.beginPath(); ctx.moveTo(0,-17); ctx.lineTo(13,15); ctx.lineTo(-13,15); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#fff'; ctx.fillRect(-10,-2,20,6);
      ctx.fillStyle='#3a2a1a'; ctx.fillRect(-15,15,30,5);
      ctx.restore();
    }
  }
  ctx.save();
  ctx.translate(car.x,car.y); ctx.rotate(car.tilt);
  // сянка
  ctx.fillStyle='rgba(0,0,0,.35)';
  rr(ctx,-car.w/2+3,-car.h/2+5,car.w,car.h,8); ctx.fill();
  var g=ctx.createLinearGradient(-car.w/2,0,car.w/2,0);
  g.addColorStop(0,'#c0392b'); g.addColorStop(.5,'#ff6b5a'); g.addColorStop(1,'#c0392b');
  ctx.fillStyle=g;
  rr(ctx,-car.w/2,-car.h/2,car.w,car.h,9); ctx.fill();
  ctx.fillStyle='#1c2733';
  rr(ctx,-car.w/2+6,-car.h/2+9,car.w-12,15,4); ctx.fill();
  rr(ctx,-car.w/2+6,car.h/2-24,car.w-12,15,4); ctx.fill();
  ctx.fillStyle='#fff3b0';
  ctx.fillRect(-car.w/2+5,-car.h/2+2,8,5); ctx.fillRect(car.w/2-13,-car.h/2+2,8,5);
  ctx.restore();
}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

var eng = new GameEngine({
  canvas: document.getElementById('cv'),
  slug: 'car-drift',
  title: 'Кола — Дрифт',
  goal: 'Събирай златните монети по пътя и избягвай оранжевите конуси. Събери нужния брой монети за да минеш нивото.',
  controls: 'Стрелки наляво/надясно или A / D. На телефон — тапни лявата/дясната половина.',
  levels: 10, lives: 3,
  init: init, update: update, draw: draw, background: background
});
eng.start();
</script>
    <script src="/shared/js/navigation.js?v=1.0094"></script>
</body>
</html>
