<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🚗 Car Drift</title>
<link rel="stylesheet" href="/shared/css/common.css">
<style>
body{background:#2a0}
body{background:#1a3a1a;color:#fff;margin:0;font-family:system-ui}
.wrap{max-width:560px;margin:20px auto;text-align:center}
canvas{background:#444;border-radius:12px;display:block;margin:0 auto;max-width:100%}
.hud{padding:14px;display:flex;justify-content:space-between;font-size:1.1em}
.btn{display:inline-block;margin:10px 6px;padding:10px 18px;background:#fff;color:#1a3a1a;border-radius:8px;text-decoration:none;border:none;cursor:pointer;font-weight:600}
#msg{margin-top:10px;min-height:28px}
</style></head>
<body>
<div class="wrap">
<div class="hud"><span>🚗 Car Drift</span><span>Точки: <b id="pts">0</b> | Ниво: <b id="lvl">1</b></span></div>
<canvas id="cv" width="500" height="600"></canvas>
<div id="msg">Hold ← или → = дрифт в завой. Не излизай извън пистата!</div>
<a class="btn" href="/portals/games/">← Игри</a>
<button class="btn" id="r">🔁 Рестарт</button>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let car,road,points,level,running,tick,keys;
function reset(){car={x:250,angle:0};road=[];for(let i=0;i<25;i++)road.push({y:i*25,cx:250,w:280});points=0;level=1;tick=0;keys={};running=true;document.getElementById('pts').textContent=0;document.getElementById('lvl').textContent=1;document.getElementById('msg').textContent='Дрифтирай!';loop();}
document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);
let touchDir=0;
cv.addEventListener('touchstart',e=>{const r=cv.getBoundingClientRect();touchDir=(e.touches[0].clientX-r.left)<r.width/2?-1:1;});
cv.addEventListener('touchend',()=>touchDir=0);
document.getElementById('r').onclick=reset;
function loop(){
  if(!running)return;tick++;
  // scroll road
  const speed=3+level*.4;
  for(const s of road)s.y+=speed;
  while(road.length&&road[0].y>620)road.shift();
  while(road[road.length-1].y<600){
    const prev=road[road.length-1];
    const curveBias=Math.sin(tick*.02)*2;
    const newCx=Math.max(160,Math.min(340,prev.cx+curveBias+(Math.random()-.5)*6));
    road.push({y:prev.y-25,cx:newCx,w:280-Math.min(100,level*5)});
  }
  ctx.clearRect(0,0,500,600);
  // трева
  ctx.fillStyle='#2a3';ctx.fillRect(0,0,500,600);
  // път
  ctx.fillStyle='#555';ctx.beginPath();
  for(let i=0;i<road.length;i++){const s=road[i];if(i===0)ctx.moveTo(s.cx-s.w/2,s.y);else ctx.lineTo(s.cx-s.w/2,s.y);}
  for(let i=road.length-1;i>=0;i--){const s=road[i];ctx.lineTo(s.cx+s.w/2,s.y);}
  ctx.closePath();ctx.fill();
  // централна линия
  ctx.strokeStyle='#ff0';ctx.lineWidth=3;ctx.setLineDash([15,15]);ctx.beginPath();
  for(let i=0;i<road.length;i++){const s=road[i];if(i===0)ctx.moveTo(s.cx,s.y);else ctx.lineTo(s.cx,s.y);}
  ctx.stroke();ctx.setLineDash([]);
  // управление
  const dir=(keys['ArrowLeft']?-1:0)+(keys['ArrowRight']?1:0)+touchDir;
  car.x+=dir*4;car.angle=dir*.3;
  // намери пътя при y на колата (y=520)
  const atCar=road.reduce((best,s)=>Math.abs(s.y-520)<Math.abs(best.y-520)?s:best,road[0]);
  if(Math.abs(car.x-atCar.cx)>atCar.w/2){running=false;document.getElementById('msg').innerHTML=`💥 Излязъл си от пистата! Точки: <b>${points}</b>`;submitScore();return;}
  points++;document.getElementById('pts').textContent=points;
  if(points>0&&points%200===0){level++;document.getElementById('lvl').textContent=level;document.getElementById('msg').innerHTML=`🎉 Ниво ${level}! Точки: <b>${points}</b>`;}
  // кола
  ctx.save();ctx.translate(car.x,520);ctx.rotate(car.angle);
  ctx.fillStyle='#e44';ctx.fillRect(-16,-26,32,52);
  ctx.fillStyle='#111';ctx.fillRect(-13,-20,26,15);
  ctx.restore();
  requestAnimationFrame(loop);
}
async function submitScore(){try{await fetch('/api/portals/games/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_slug:'car-drift',score:points,level})});}catch(e){}}
reset();
</script></body></html>
