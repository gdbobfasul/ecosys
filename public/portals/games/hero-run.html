<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Герой — Бягане | KCY игри</title>
<style>
  body{margin:0;background:#0a1018;color:#fff;font-family:system-ui;text-align:center}
  .top{padding:12px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
  .top a{background:#1d2b3a;color:#9cc4e0;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.9em}
  canvas{display:block;margin:0 auto;border-radius:12px;max-width:100%;box-shadow:0 10px 40px rgba(0,0,0,.5)}
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0095">
</head>
<body>
<div class="top">
  <a href="/portals/games/">← Всички игри</a>
  <a href="/portals/games/?rank=1">🏆 Ранг листа</a>
</div>
<canvas id="cv" width="440" height="600"></canvas>
<script src="/portals/games/game-engine.js"></script>
<script>
var hero, obs, groundY, scrollX, hills, runFrame;

function init(eng, level){
  groundY=eng.H-90;
  hero={x:80,y:groundY-44,w:34,h:44,vy:0,onGround:true};
  obs=[]; scrollX=0; runFrame=0;
  hills=[]; for(var i=0;i<6;i++) hills.push({x:i*140,h:60+Math.random()*70});
  eng._dist=0;
  eng._target=2600+level*600;
  eng._speed=4.5+level*0.8;
  eng._spawnCd=70;
}

function update(eng,dt){
  // скок
  if((eng.keys['Space']||eng.keys['ArrowUp'])&&hero.onGround){
    hero.vy=-14; hero.onGround=false;
  }
  hero.vy+=0.7*dt;
  hero.y+=hero.vy*dt;
  if(hero.y>=groundY-hero.h){ hero.y=groundY-hero.h; hero.vy=0; hero.onGround=true; }

  scrollX+=eng._speed*dt;
  eng._dist+=eng._speed*dt;
  eng.score+=Math.round(eng._speed*dt*0.25);
  runFrame+=dt*0.4;

  // хълмове паралакс
  for(var i=0;i<hills.length;i++){
    hills[i].x-=eng._speed*0.3*dt;
    if(hills[i].x<-160){ hills[i].x+=6*140; hills[i].h=60+Math.random()*70; }
  }

  eng._spawnCd-=dt;
  if(eng._spawnCd<=0){
    var tall=Math.random()<0.4;
    obs.push({x:eng.W+20,y:groundY-(tall?52:32),w:tall?26:34,h:tall?52:32});
    eng._spawnCd=Math.max(42,90-eng.level*5)+Math.random()*30;
  }
  for(var o=obs.length-1;o>=0;o--){
    obs[o].x-=eng._speed*dt;
    var a={x:hero.x+5,y:hero.y+3,w:hero.w-10,h:hero.h-4};
    if(eng.rectHit(a,obs[o])) return 'dead';
    if(obs[o].x+obs[o].w<0){ obs.splice(o,1); eng.score+=15; }
  }
  if(eng._dist>=eng._target) return 'next';
  return null;
}

function background(eng,ctx){
  var g=ctx.createLinearGradient(0,0,0,eng.H);
  g.addColorStop(0,'#ffd194'); g.addColorStop(.6,'#ff9d6c'); g.addColorStop(1,'#d76d77');
  ctx.fillStyle=g; ctx.fillRect(0,0,eng.W,eng.H);
  // слънце
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.beginPath(); ctx.arc(eng.W-70,90,40,0,7); ctx.fill();
  // хълмове
  for(var i=0;i<hills.length;i++){
    var hl=hills[i];
    ctx.fillStyle='#9c5a8c';
    ctx.beginPath();
    ctx.moveTo(hl.x-70,groundY);
    ctx.quadraticCurveTo(hl.x,groundY-hl.h,hl.x+70,groundY);
    ctx.fill();
  }
}

function draw(eng,ctx){
  // земя
  ctx.fillStyle='#5a3d2b'; ctx.fillRect(0,groundY,eng.W,eng.H-groundY);
  ctx.fillStyle='#6e4a33';
  for(var i=0;i<14;i++){ var x=((i*60-scrollX)%(eng.W+60)+eng.W+60)%(eng.W+60)-30; ctx.fillRect(x,groundY,30,8); }
  ctx.fillStyle='#3f7d3f'; ctx.fillRect(0,groundY-4,eng.W,6);
  // препятствия (камъни/кактуси)
  for(var o=0;o<obs.length;o++){
    var ob=obs[o];
    ctx.fillStyle='#3a7d3a';
    rr(ctx,ob.x,ob.y,ob.w,ob.h,6); ctx.fill();
    ctx.fillStyle='#2c5e2c';
    rr(ctx,ob.x+4,ob.y+4,ob.w-8,ob.h-8,4); ctx.fill();
  }
  // герой
  drawRunner(ctx,hero);
}

function drawRunner(ctx,h){
  var cx=h.x+h.w/2, cy=h.y;
  ctx.save(); ctx.translate(cx,cy);
  // крака — анимация на бягане
  var leg=Math.sin(runFrame)*7;
  ctx.strokeStyle='#2c3e50'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-2,30); ctx.lineTo(-2+leg,44); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,30); ctx.lineTo(2-leg,44); ctx.stroke();
  // тяло
  ctx.fillStyle='#e8612c';
  rr(ctx,-9,8,18,24,6); ctx.fill();
  // ръце
  ctx.strokeStyle='#e8612c'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(-6,14); ctx.lineTo(-10-leg*0.5,24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,14); ctx.lineTo(10+leg*0.5,24); ctx.stroke();
  // глава
  ctx.fillStyle='#ffd9a8';
  ctx.beginPath(); ctx.arc(0,0,10,0,7); ctx.fill();
  ctx.fillStyle='#5a3a22';
  ctx.beginPath(); ctx.arc(0,-2,10,Math.PI,0); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(5,0,1.8,0,7); ctx.fill();
  ctx.restore();
}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

var eng = new GameEngine({
  canvas: document.getElementById('cv'),
  slug: 'hero-run',
  title: 'Герой — Бягане',
  goal: 'Бягай напред и прескачай препятствията. Стигни края на дистанцията — всяко ниво е по-дълго и по-бързо.',
  controls: 'SPACE или ↑ за скок. На телефон — тапни екрана за скок.',
  levels: 10, lives: 3,
  init: init, update: update, draw: draw, background: background
});
eng.start();
</script>
    <script src="/shared/js/navigation.js?v=1.0095"></script>
</body>
</html>
