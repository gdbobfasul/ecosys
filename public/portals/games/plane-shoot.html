<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Самолет — Стрелба | KCY игри</title>
<style>
  body{margin:0;background:#0a1018;color:#fff;font-family:system-ui;text-align:center}
  .top{padding:12px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
  .top a{background:#1d2b3a;color:#9cc4e0;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.9em}
  canvas{display:block;margin:0 auto;border-radius:12px;max-width:100%;box-shadow:0 10px 40px rgba(0,0,0,.5)}
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0115">
</head>
<body>
<div class="top">
  <a href="/portals/games/" data-i18n="g.all_games">← Всички игри</a>
  <a href="/portals/games/?rank=1" data-i18n="g.leaderboard">🏆 Ранг листа</a>
</div>
<canvas id="cv" width="440" height="600"></canvas>
<script src="/portals/games/game-engine.js"></script>
<script>
var plane, bullets, foes, stars, fireCd;

function init(eng, level){
  plane = { x: eng.W/2-22, y: eng.H-90, w: 44, h: 38, vx:0 };
  bullets = []; foes = []; fireCd = 0;
  stars = [];
  for (var i=0;i<40;i++) stars.push({x:Math.random()*eng.W,y:Math.random()*eng.H,s:0.5+Math.random()*1.5});
  eng._killed = 0;
  eng._need = 8 + level*2;          // свалени врагове за ниво
  eng._foeSpeed = 1.4 + level*0.3;
  eng._spawnCd = 0;
  eng._spawnEvery = Math.max(22, 60 - level*4);
}

function update(eng, dt){
  var acc=0;
  if (eng.keys['ArrowLeft']||eng.keys['KeyA']) acc=-0.8;
  if (eng.keys['ArrowRight']||eng.keys['KeyD']) acc=0.8;
  plane.vx += acc*dt; plane.vx *= 0.9;
  plane.x += plane.vx*dt;
  if (plane.x<4){plane.x=4;plane.vx=0;}
  if (plane.x>eng.W-plane.w-4){plane.x=eng.W-plane.w-4;plane.vx=0;}

  // стрелба
  fireCd -= dt;
  if ((eng.keys['Space']||eng.keys['ArrowUp']) && fireCd<=0){
    bullets.push({x:plane.x+plane.w/2-2,y:plane.y-4,w:4,h:12});
    fireCd = 9;
  }
  for (var i=bullets.length-1;i>=0;i--){
    bullets[i].y -= 9*dt;
    if (bullets[i].y < -12) bullets.splice(i,1);
  }
  // звезди
  for (var s=0;s<stars.length;s++){ stars[s].y += stars[s].s*dt; if(stars[s].y>eng.H){stars[s].y=0;stars[s].x=Math.random()*eng.W;} }

  // спаун врагове
  eng._spawnCd -= dt;
  if (eng._spawnCd<=0){
    foes.push({x:20+Math.random()*(eng.W-60),y:-36,w:38,h:32,vx:(Math.random()-0.5)*1.4});
    eng._spawnCd = eng._spawnEvery;
  }
  for (var f=foes.length-1;f>=0;f--){
    var fo = foes[f];
    fo.y += eng._foeSpeed*dt; fo.x += fo.vx*dt;
    if (fo.x<0||fo.x>eng.W-fo.w) fo.vx*=-1;
    // улучен ли е
    var hit=false;
    for (var b=bullets.length-1;b>=0;b--){
      if (eng.rectHit(bullets[b],fo)){
        bullets.splice(b,1); hit=true;
        eng.burst(fo.x+fo.w/2,fo.y+fo.h/2,'#ff9b3d',22);
        eng.score += 25; eng._killed++;
        break;
      }
    }
    if (hit){ foes.splice(f,1); continue; }
    if (eng.rectHit(plane,fo)) return 'dead';
    if (fo.y>eng.H){ foes.splice(f,1); }
  }
  if (eng._killed >= eng._need) return 'next';
  return null;
}

function background(eng, ctx){
  var g=ctx.createLinearGradient(0,0,0,eng.H);
  g.addColorStop(0,'#080d1f'); g.addColorStop(1,'#1a2347');
  ctx.fillStyle=g; ctx.fillRect(0,0,eng.W,eng.H);
  ctx.fillStyle='#fff';
  for (var i=0;i<stars.length;i++){
    ctx.globalAlpha=stars[i].s/2;
    ctx.fillRect(stars[i].x,stars[i].y,stars[i].s,stars[i].s);
  }
  ctx.globalAlpha=1;
}

function draw(eng, ctx){
  // куршуми
  ctx.fillStyle='#ffe24a';
  for (var i=0;i<bullets.length;i++){
    var b=bullets[i];
    ctx.shadowColor='#ffe24a'; ctx.shadowBlur=8;
    ctx.fillRect(b.x,b.y,b.w,b.h);
  }
  ctx.shadowBlur=0;
  // врагове
  for (var f=0;f<foes.length;f++) drawFoe(ctx,foes[f]);
  // играч
  ctx.save();
  ctx.translate(plane.x+plane.w/2,plane.y+plane.h/2);
  drawHero(ctx,plane.w,plane.h);
  ctx.restore();
}

function drawHero(ctx,w,h){
  ctx.fillStyle='#3aa0ff';
  ctx.beginPath();
  ctx.moveTo(-w/2,8); ctx.lineTo(0,2); ctx.lineTo(w/2,8);
  ctx.lineTo(w/2-7,16); ctx.lineTo(-w/2+7,16); ctx.closePath(); ctx.fill();
  var g=ctx.createLinearGradient(-8,0,8,0);
  g.addColorStop(0,'#cfe6ff'); g.addColorStop(.5,'#fff'); g.addColorStop(1,'#9fc0db');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(0,-h/2); ctx.quadraticCurveTo(9,0,7,h/2-4);
  ctx.lineTo(-7,h/2-4); ctx.quadraticCurveTo(-9,0,0,-h/2); ctx.fill();
  ctx.fillStyle='#2c3e50';
  ctx.beginPath(); ctx.ellipse(0,-h/5,4,6,0,0,7); ctx.fill();
}

function drawFoe(ctx,f){
  ctx.save();
  ctx.translate(f.x+f.w/2,f.y+f.h/2);
  ctx.fillStyle='#7d3c98';
  ctx.beginPath();
  ctx.moveTo(-f.w/2,-6); ctx.lineTo(0,2); ctx.lineTo(f.w/2,-6);
  ctx.lineTo(f.w/2-6,-12); ctx.lineTo(-f.w/2+6,-12); ctx.closePath(); ctx.fill();
  var g=ctx.createLinearGradient(0,-8,0,10);
  g.addColorStop(0,'#b06fd0'); g.addColorStop(1,'#5b2c6f');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(0,f.h/2); ctx.quadraticCurveTo(10,0,7,-8);
  ctx.lineTo(-7,-8); ctx.quadraticCurveTo(-10,0,0,f.h/2); ctx.fill();
  ctx.fillStyle='#ff5544';
  ctx.beginPath(); ctx.arc(0,2,4,0,7); ctx.fill();
  ctx.restore();
}

var eng = new GameEngine({
  canvas: document.getElementById('cv'),
  slug: 'plane-shoot',
  title: (window.KCY_I18N?KCY_I18N.t('g.plane_shoot_t'):'Самолет — Стрелба'),
  goal: (window.KCY_I18N?KCY_I18N.t('g.plane_shoot_g'):'Стреляй по враговете...'),
  controls: (window.KCY_I18N?KCY_I18N.t('g.ctrl_shoot'):'Движение + SPACE стрелба.'),
  levels: 10, lives: 3,
  init: init, update: update, draw: draw, background: background
});
eng.start();
</script>
    <script src="/shared/js/navigation.js?v=1.0195"></script>
</body>
</html>
