<!-- Version: 1.0086 -->
<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🛩️ Plane Shoot</title>
<link rel="stylesheet" href="/shared/css/common.css">
<style>
body{background:#001a30;color:#fff;margin:0;font-family:system-ui}
.wrap{max-width:560px;margin:20px auto;text-align:center}
canvas{background:linear-gradient(180deg,#1a3a5c,#002030);border-radius:12px;display:block;margin:0 auto;max-width:100%}
.hud{padding:14px;display:flex;justify-content:space-between;font-size:1.1em}
.btn{display:inline-block;margin:10px 6px;padding:10px 18px;background:#fff;color:#001a30;border-radius:8px;text-decoration:none;border:none;cursor:pointer;font-weight:600}
#msg{margin-top:10px;min-height:28px}
</style></head>
<body>
<div class="wrap">
<div class="hud"><span>🛩️ Plane Shoot</span><span>Точки: <b id="pts">0</b> | Ниво: <b id="lvl">1</b></span></div>
<canvas id="cv" width="500" height="600"></canvas>
<div id="msg">Move: ←/→ или мишка. Space/клик = стреляй. Сваляй врагове!</div>
<a class="btn" href="/portals/games/">← Игри</a>
<button class="btn" id="r">🔁 Рестарт</button>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let plane,bullets,enemies,points,level,running,keys,tick;
function reset(){plane={x:250,y:540};bullets=[];enemies=[];points=0;level=1;keys={};tick=0;running=true;document.getElementById('pts').textContent=0;document.getElementById('lvl').textContent=1;document.getElementById('msg').textContent='В битка!';loop();}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.code==='Space'){e.preventDefault();shoot();}});
document.addEventListener('keyup',e=>keys[e.key]=false);
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();plane.x=(e.clientX-r.left)*(500/r.width);});
cv.addEventListener('click',shoot);
document.getElementById('r').onclick=reset;
function shoot(){bullets.push({x:plane.x,y:plane.y-20});}
function spawn(){enemies.push({x:Math.random()*460+20,y:-20,s:1.5+level*.3,hp:1+Math.floor(level/3)});}
function loop(){
  if(!running)return;tick++;
  if(tick%(Math.max(20,55-level*3))===0)spawn();
  if(keys['ArrowLeft'])plane.x-=5;if(keys['ArrowRight'])plane.x+=5;
  plane.x=Math.max(20,Math.min(480,plane.x));
  ctx.clearRect(0,0,500,600);
  // звезди
  ctx.fillStyle='rgba(255,255,255,.3)';for(let i=0;i<40;i++){ctx.fillRect((i*37+tick/3)%500,(i*71)%600,2,2);}
  // куршуми
  ctx.fillStyle='#fd0';
  for(const b of bullets){b.y-=8;ctx.fillRect(b.x-2,b.y,4,10);}
  for(let i=bullets.length-1;i>=0;i--)if(bullets[i].y<-20)bullets.splice(i,1);
  // врагове
  for(const en of enemies){
    en.y+=en.s;
    ctx.fillStyle='#f44';ctx.beginPath();ctx.moveTo(en.x,en.y+15);ctx.lineTo(en.x-15,en.y-10);ctx.lineTo(en.x+15,en.y-10);ctx.closePath();ctx.fill();
    if(en.y>620){running=false;document.getElementById('msg').innerHTML=`💥 Враг мина! Точки: <b>${points}</b>`;submitScore();return;}
    for(let j=bullets.length-1;j>=0;j--){
      if(Math.abs(bullets[j].x-en.x)<18&&Math.abs(bullets[j].y-en.y)<18){
        bullets.splice(j,1);en.hp--;if(en.hp<=0){en.y=9999;points++;document.getElementById('pts').textContent=points;if(points%10===0){level++;document.getElementById('lvl').textContent=level;document.getElementById('msg').innerHTML=`🎉 Ниво ${level}! Точки: <b>${points}</b>`;}}
        break;
      }
    }
  }
  for(let i=enemies.length-1;i>=0;i--)if(enemies[i].y>9000)enemies.splice(i,1);
  // нашият самолет
  ctx.fillStyle='#4f8';ctx.beginPath();ctx.moveTo(plane.x,plane.y-15);ctx.lineTo(plane.x-16,plane.y+12);ctx.lineTo(plane.x,plane.y+5);ctx.lineTo(plane.x+16,plane.y+12);ctx.closePath();ctx.fill();
  requestAnimationFrame(loop);
}
async function submitScore(){try{await fetch('/api/portals/games/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_slug:'plane-shoot',score:points,level})});}catch(e){}}
reset();
</script></body></html>
