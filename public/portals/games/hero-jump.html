<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Герой — Скачане | KCY игри</title>
<style>
  body{margin:0;background:#0a1018;color:#fff;font-family:system-ui;text-align:center}
  .top{padding:12px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
  .top a{background:#1d2b3a;color:#9cc4e0;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.9em}
  canvas{display:block;margin:0 auto;border-radius:12px;max-width:100%;box-shadow:0 10px 40px rgba(0,0,0,.5)}
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0115">
</head>
<body>
<div class="top">
  <a href="/portals/games/">← Всички игри</a>
  <a href="/portals/games/?rank=1">🏆 Ранг листа</a>
</div>
<canvas id="cv" width="440" height="600"></canvas>
<script src="/portals/games/game-engine.js"></script>
<script>
var hero, plats, climbed, camY;

function init(eng, level){
  hero={x:eng.W/2-16,y:eng.H-140,w:32,h:38,vx:0,vy:0,onGround:false,face:1};
  plats=[];
  camY=0; climbed=0;
  // начална платформа
  plats.push({x:eng.W/2-50,y:eng.H-90,w:100,h:16});
  var gap=86-level*2;
  for(var i=1;i<60;i++){
    plats.push({x:Math.random()*(eng.W-90),y:eng.H-90-i*gap,w:70+Math.random()*40,h:15});
  }
  eng._gap=gap;
  eng._need=18+level*2;     // платформи за изкачване
}

function update(eng,dt){
  var acc=0;
  if(eng.keys['ArrowLeft']||eng.keys['KeyA']){acc=-0.7;hero.face=-1;}
  if(eng.keys['ArrowRight']||eng.keys['KeyD']){acc=0.7;hero.face=1;}
  hero.vx+=acc*dt; hero.vx*=0.86;
  hero.x+=hero.vx*dt;
  if(hero.x<-hero.w) hero.x=eng.W;
  if(hero.x>eng.W) hero.x=-hero.w;

  // скок
  if((eng.keys['Space']||eng.keys['ArrowUp'])&&hero.onGround){
    hero.vy=-13; hero.onGround=false;
  }
  hero.vy+=0.55*dt;
  hero.y+=hero.vy*dt;

  // кацане на платформа (само при падане)
  hero.onGround=false;
  if(hero.vy>0){
    for(var i=0;i<plats.length;i++){
      var p=plats[i];
      if(hero.x+hero.w>p.x && hero.x<p.x+p.w &&
         hero.y+hero.h>p.y && hero.y+hero.h<p.y+p.h+hero.vy*dt+2){
        hero.y=p.y-hero.h; hero.vy=0; hero.onGround=true;
        if(!p.used){ p.used=true; climbed++; eng.score+=30; eng.burst(hero.x+hero.w/2,hero.y+hero.h,'#5cd97a',8); }
      }
    }
  }

  // камера следва нагоре
  var want=hero.y-eng.H*0.55;
  if(want<camY) camY=want;

  // падане долу = смърт
  if(hero.y-camY>eng.H+40) return 'dead';
  if(climbed>=eng._need) return 'next';
  return null;
}

function background(eng,ctx){
  var g=ctx.createLinearGradient(0,0,0,eng.H);
  g.addColorStop(0,'#2c1a4d'); g.addColorStop(1,'#6b4ba0');
  ctx.fillStyle=g; ctx.fillRect(0,0,eng.W,eng.H);
  // звезди (паралакс спрямо камерата)
  ctx.fillStyle='rgba(255,255,255,.5)';
  for(var i=0;i<30;i++){
    var sx=(i*71)%eng.W;
    var sy=((i*123 - camY*0.3)%eng.H+eng.H)%eng.H;
    ctx.fillRect(sx,sy,2,2);
  }
}

function draw(eng,ctx){
  ctx.save();
  ctx.translate(0,-camY);
  // платформи
  for(var i=0;i<plats.length;i++){
    var p=plats[i];
    if(p.y-camY<-30||p.y-camY>eng.H+30) continue;
    ctx.fillStyle='rgba(0,0,0,.25)';
    rr(ctx,p.x+2,p.y+3,p.w,p.h,6); ctx.fill();
    var g=ctx.createLinearGradient(0,p.y,0,p.y+p.h);
    g.addColorStop(0, p.used?'#7de89a':'#9be8ad'); g.addColorStop(1,'#3a9d57');
    ctx.fillStyle=g;
    rr(ctx,p.x,p.y,p.w,p.h,6); ctx.fill();
  }
  // герой
  drawHero(ctx,hero);
  ctx.restore();
}

function drawHero(ctx,h){
  var cx=h.x+h.w/2, cy=h.y+h.h/2;
  ctx.save(); ctx.translate(cx,cy);
  if(h.face<0) ctx.scale(-1,1);
  // тяло
  ctx.fillStyle='#3aa0ff';
  rr(ctx,-9,-4,18,18,5); ctx.fill();
  // глава
  ctx.fillStyle='#ffd9a8';
  ctx.beginPath(); ctx.arc(0,-13,9,0,7); ctx.fill();
  // коса
  ctx.fillStyle='#5a3a22';
  ctx.beginPath(); ctx.arc(0,-15,9,Math.PI,0); ctx.fill();
  // око
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(4,-13,1.6,0,7); ctx.fill();
  // крака
  ctx.fillStyle='#2c3e50';
  ctx.fillRect(-7,13,5,8); ctx.fillRect(3,13,5,8);
  // ръце
  ctx.fillStyle='#3aa0ff';
  ctx.fillRect(-13,-2,4,11); ctx.fillRect(9,-2,4,11);
  ctx.restore();
}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

var eng = new GameEngine({
  canvas: document.getElementById('cv'),
  slug: 'hero-jump',
  title: 'Герой — Скачане',
  goal: 'Скачай от платформа на платформа нагоре. Не падай долу. Изкачи нужния брой платформи за да минеш нивото.',
  controls: 'Стрелки наляво/надясно или A / D движение, SPACE или ↑ скок. На телефон — тапни половината + автоскок.',
  levels: 10, lives: 3,
  init: init, update: update, draw: draw, background: background
});
eng.start();
</script>
    <script src="/shared/js/navigation.js?v=1.0115"></script>
</body>
</html>
