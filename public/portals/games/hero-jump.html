<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦸 Hero Jump</title>
<link rel="stylesheet" href="/shared/css/common.css">
<style>
body{background:#2a1a4a;color:#fff;margin:0;font-family:system-ui}
.wrap{max-width:560px;margin:20px auto;text-align:center}
canvas{background:linear-gradient(180deg,#a770ef,#cf8bf3);border-radius:12px;display:block;margin:0 auto;max-width:100%}
.hud{padding:14px;display:flex;justify-content:space-between;font-size:1.1em}
.btn{display:inline-block;margin:10px 6px;padding:10px 18px;background:#fff;color:#2a1a4a;border-radius:8px;text-decoration:none;border:none;cursor:pointer;font-weight:600}
#msg{margin-top:10px;min-height:28px}
</style></head>
<body>
<div class="wrap">
<div class="hud"><span>🦸 Hero Jump</span><span>Точки: <b id="pts">0</b> | Ниво: <b id="lvl">1</b></span></div>
<canvas id="cv" width="500" height="600"></canvas>
<div id="msg">Space/клик = скок. Не падай в пропастите! Герой с необичайни възможности — двоен скок!</div>
<a class="btn" href="/portals/games/">← Игри</a>
<button class="btn" id="r">🔁 Рестарт</button>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let hero,platforms,points,level,running,jumps;
function reset(){hero={x:80,y:400,vy:0,onGround:false};platforms=[];for(let i=0;i<5;i++)platforms.push({x:i*120+20,y:500,w:100,gap:false});points=0;level=1;jumps=2;running=true;document.getElementById('pts').textContent=0;document.getElementById('lvl').textContent=1;document.getElementById('msg').textContent='Играй!';loop();}
function jump(){if(jumps>0){hero.vy=-11;jumps--;}}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
cv.addEventListener('click',jump);
document.getElementById('r').onclick=reset;
function loop(){
  if(!running)return;
  ctx.clearRect(0,0,500,600);
  // slънце
  ctx.fillStyle='rgba(255,255,180,.6)';ctx.beginPath();ctx.arc(450,70,35,0,7);ctx.fill();
  // гравитация
  hero.vy+=.5;hero.y+=hero.vy;
  // движим платформите наляво
  const speed=3+level*.3;
  for(const p of platforms)p.x-=speed;
  // премахни извън екран, добави нови
  while(platforms.length&&platforms[0].x+platforms[0].w<0){platforms.shift();points++;document.getElementById('pts').textContent=points;if(points%7===0){level++;document.getElementById('lvl').textContent=level;document.getElementById('msg').innerHTML=`🎉 Ниво ${level}! Точки: <b>${points}</b>`;}}
  while(platforms[platforms.length-1].x<400){const prev=platforms[platforms.length-1];platforms.push({x:prev.x+prev.w+40+Math.random()*80,y:450+Math.random()*80,w:70+Math.random()*60,gap:false});}
  // колизии
  hero.onGround=false;
  for(const p of platforms){
    if(hero.x+20>p.x&&hero.x-20<p.x+p.w&&hero.y+30>=p.y&&hero.y+30<=p.y+15&&hero.vy>=0){
      hero.y=p.y-30;hero.vy=0;hero.onGround=true;jumps=2;
    }
    ctx.fillStyle='#7a3';ctx.fillRect(p.x,p.y,p.w,20);
  }
  if(hero.y>620){running=false;document.getElementById('msg').innerHTML=`💀 Падна! Точки: <b>${points}</b>`;submitScore();return;}
  // герой с "необичайни възможности" - плащ
  ctx.save();ctx.translate(hero.x,hero.y);
  ctx.fillStyle='#e22';ctx.beginPath();ctx.moveTo(-5,-25);ctx.lineTo(-25,10);ctx.lineTo(5,5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fcd';ctx.beginPath();ctx.arc(0,-10,12,0,7);ctx.fill();
  ctx.fillStyle='#33f';ctx.fillRect(-10,2,20,22);
  ctx.restore();
  requestAnimationFrame(loop);
}
async function submitScore(){try{await fetch('/api/portals/games/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_slug:'hero-jump',score:points,level})});}catch(e){}}
reset();
</script></body></html>
