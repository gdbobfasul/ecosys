<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Самолет — Избягвай | KCY игри</title>
<style>
  body{margin:0;background:#0a1018;color:#fff;font-family:system-ui;text-align:center}
  .top{padding:12px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
  .top a{background:#1d2b3a;color:#9cc4e0;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:.9em}
  canvas{display:block;margin:0 auto;border-radius:12px;max-width:100%;box-shadow:0 10px 40px rgba(0,0,0,.5)}
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0115">
</head>
<body>
<div class="top">
  <a href="/portals/games/" data-i18n="g.all_games">← Всички игри</a>
  <a href="/portals/games/?rank=1" data-i18n="g.leaderboard">🏆 Ранг листа</a>
</div>
<canvas id="cv" width="440" height="600"></canvas>
<script src="/portals/games/game-engine.js"></script>
<script>
var plane, clouds, scroll;

function init(eng, level){
  plane = { x: eng.W/2-24, y: eng.H-110, w: 48, h: 40, vx: 0, tilt: 0 };
  clouds = [];
  scroll = 0;
  var count = 4 + level;
  for (var i=0;i<count;i++) spawnCloud(eng, -Math.random()*eng.H);
  eng._levelDist = 0;
  eng._target = 1400 + level*400;   // дистанция за завършване на нивото
  eng._speed = 2.3 + level*0.45;
}

function spawnCloud(eng, y){
  var r = 26 + Math.random()*30;
  clouds.push({ x: r + Math.random()*(eng.W-2*r), y: y, r: r, drift:(Math.random()-0.5)*0.6 });
}

function update(eng, dt){
  // движение
  var acc = 0;
  if (eng.keys['ArrowLeft']||eng.keys['KeyA']) acc = -0.7;
  if (eng.keys['ArrowRight']||eng.keys['KeyD']) acc = 0.7;
  plane.vx += acc*dt;
  plane.vx *= 0.92;
  plane.x += plane.vx*dt;
  plane.tilt += ((plane.vx*0.04) - plane.tilt)*0.2;
  if (plane.x < 4){ plane.x = 4; plane.vx = 0; }
  if (plane.x > eng.W-plane.w-4){ plane.x = eng.W-plane.w-4; plane.vx = 0; }

  // изгорели газове
  eng.trail(plane.x+plane.w/2, plane.y+plane.h, '#ffae42');

  // облаци падат
  scroll += eng._speed*dt;
  eng._levelDist += eng._speed*dt;
  for (var i=clouds.length-1;i>=0;i--){
    var c = clouds[i];
    c.y += eng._speed*dt;
    c.x += c.drift*dt;
    if (c.y - c.r > eng.H){ clouds.splice(i,1); spawnCloud(eng, -40); eng.score += 5; }
    // сблъсък (кръг-правоъгълник, опростено)
    var cx = Math.max(plane.x, Math.min(c.x, plane.x+plane.w));
    var cy = Math.max(plane.y, Math.min(c.y, plane.y+plane.h));
    var dx = c.x-cx, dy = c.y-cy;
    if (dx*dx+dy*dy < (c.r*0.78)*(c.r*0.78)) return 'dead';
  }
  if (eng._levelDist >= eng._target) return 'next';
  return null;
}

function background(eng, ctx){
  var g = ctx.createLinearGradient(0,0,0,eng.H);
  g.addColorStop(0,'#1b3a5c'); g.addColorStop(0.5,'#2a86d8'); g.addColorStop(1,'#7ec8ec');
  ctx.fillStyle = g; ctx.fillRect(0,0,eng.W,eng.H);
  // далечни звезди/паралакс точки
  ctx.fillStyle = 'rgba(255,255,255,.25)';
  for (var i=0;i<24;i++){
    var y = ((i*97 + scroll*0.3) % eng.H);
    ctx.fillRect((i*53)%eng.W, y, 2, 2);
  }
}

function draw(eng, ctx){
  // облаци — с мека сянка
  for (var i=0;i<clouds.length;i++){
    var c = clouds[i];
    ctx.fillStyle = 'rgba(0,0,0,.12)';
    puff(ctx, c.x+4, c.y+6, c.r);
    ctx.fillStyle = '#f4f8fb';
    puff(ctx, c.x, c.y, c.r);
    ctx.fillStyle = '#dde7ee';
    puff(ctx, c.x, c.y+c.r*0.35, c.r*0.7);
  }
  // самолет
  ctx.save();
  ctx.translate(plane.x+plane.w/2, plane.y+plane.h/2);
  ctx.rotate(plane.tilt);
  drawPlane(ctx, plane.w, plane.h);
  ctx.restore();
}

function puff(ctx,x,y,r){
  ctx.beginPath();
  ctx.arc(x-r*0.6,y,r*0.6,0,7); ctx.arc(x,y-r*0.3,r*0.75,0,7);
  ctx.arc(x+r*0.6,y,r*0.6,0,7); ctx.arc(x,y+r*0.15,r*0.7,0,7);
  ctx.fill();
}

function drawPlane(ctx,w,h){
  // крила
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(-w/2,4); ctx.lineTo(0,-2); ctx.lineTo(w/2,4);
  ctx.lineTo(w/2-6,12); ctx.lineTo(-w/2+6,12); ctx.closePath(); ctx.fill();
  // корпус
  var g = ctx.createLinearGradient(-8,0,8,0);
  g.addColorStop(0,'#e8eef2'); g.addColorStop(.5,'#fff'); g.addColorStop(1,'#aeb9c2');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0,-h/2); ctx.quadraticCurveTo(9,-6,8,h/2-6);
  ctx.lineTo(-8,h/2-6); ctx.quadraticCurveTo(-9,-6,0,-h/2); ctx.fill();
  // опашка
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(0,h/2-12); ctx.lineTo(8,h/2+2); ctx.lineTo(-8,h/2+2); ctx.fill();
  // кокпит
  ctx.fillStyle = '#2c3e50';
  ctx.beginPath(); ctx.ellipse(0,-h/4,4,7,0,0,7); ctx.fill();
}

var eng = new GameEngine({
  canvas: document.getElementById('cv'),
  slug: 'plane-dodge',
  title: (window.KCY_I18N?KCY_I18N.t('g.plane_dodge_t'):'Самолет — Избягвай'),
  goal: (window.KCY_I18N?KCY_I18N.t('g.plane_dodge_g'):'Избягвай облаците...'),
  controls: (window.KCY_I18N?KCY_I18N.t('g.ctrl_lr'):'Стрелки наляво/надясно.'),
  levels: 10, lives: 3,
  init: init, update: update, draw: draw, background: background
});
eng.start();
</script>
    <script src="/shared/js/navigation.js?v=1.0115"></script>
</body>
</html>
