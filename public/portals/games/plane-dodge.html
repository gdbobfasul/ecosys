<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>✈️ Plane Dodge</title>
<link rel="stylesheet" href="/shared/css/common.css">
<style>
body{background:#0a1930;color:#fff;margin:0;font-family:system-ui}
.wrap{max-width:560px;margin:20px auto;text-align:center}
canvas{background:linear-gradient(180deg,#6ec1e4,#2a86d8);border-radius:12px;display:block;margin:0 auto;max-width:100%}
.hud{padding:14px;display:flex;justify-content:space-between;font-size:1.1em}
.btn{display:inline-block;margin:10px 6px;padding:10px 18px;background:#fff;color:#0a1930;border-radius:8px;text-decoration:none;border:none;cursor:pointer;font-weight:600}
#msg{margin-top:10px;min-height:28px;font-size:1.1em}
</style></head>
<body>
<div class="wrap">
<div class="hud"><span>✈️ Plane Dodge</span><span>Точки: <b id="pts">0</b> | Ниво: <b id="lvl">1</b></span></div>
<canvas id="cv" width="500" height="600"></canvas>
<div id="msg">Клик / Space = скок наляво-надясно. Избягвай облаците!</div>
<a class="btn" href="/portals/games/">← Игри</a>
<button class="btn" id="r">🔁 Рестарт</button>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let plane,obs,points,level,running,tick;
function reset(){plane={x:250,y:500,w:40,h:30,dir:0};obs=[];points=0;level=1;tick=0;running=true;document.getElementById('pts').textContent=0;document.getElementById('lvl').textContent=1;document.getElementById('msg').textContent='Играй!';loop();}
function spawn(){obs.push({x:Math.random()*460+20,y:-20,r:18+Math.random()*10,s:2+level*.4});}
function toggle(){plane.dir=plane.dir===0?1:0;}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();toggle();}});
cv.addEventListener('click',toggle);
document.getElementById('r').onclick=reset;
function loop(){
  if(!running)return;
  tick++;
  if(tick%30===0)spawn();
  ctx.clearRect(0,0,500,600);
  // fon - облачета в backgound
  ctx.fillStyle='rgba(255,255,255,.15)';for(let i=0;i<6;i++){ctx.beginPath();ctx.arc((tick*.3+i*90)%500,80+i*60,25,0,7);ctx.fill();}
  // obstacles
  ctx.fillStyle='#fff';
  for(const o of obs){
    o.y+=o.s;
    ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,7);ctx.fill();
    // collision
    if(Math.hypot(o.x-plane.x,o.y-plane.y)<o.r+18){
      running=false;document.getElementById('msg').innerHTML=`💥 Край! Точки: <b>${points}</b>`;submitScore();return;
    }
  }
  for(let i=obs.length-1;i>=0;i--)if(obs[i].y>650){obs.splice(i,1);points++;document.getElementById('pts').textContent=points;if(points>0&&points%10===0){level++;document.getElementById('lvl').textContent=level;document.getElementById('msg').innerHTML=`🎉 Ниво ${level}! Точки: <b>${points}</b>`;}}
  // plane movement
  const tgt=plane.dir?150:350;plane.x+=(tgt-plane.x)*.15;
  // draw plane
  ctx.save();ctx.translate(plane.x,plane.y);
  ctx.fillStyle='#ffcc00';
  ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(-18,15);ctx.lineTo(0,8);ctx.lineTo(18,15);ctx.closePath();ctx.fill();
  ctx.restore();
  requestAnimationFrame(loop);
}
async function submitScore(){try{await fetch('/api/portals/games/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_slug:'plane-dodge',score:points,level})});}catch(e){}}
reset();
</script></body></html>
