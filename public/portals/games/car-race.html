<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏎️ Car Race</title>
<link rel="stylesheet" href="/shared/css/common.css">
<style>
body{background:#111;color:#fff;margin:0;font-family:system-ui}
.wrap{max-width:560px;margin:20px auto;text-align:center}
canvas{background:#333;border-radius:12px;display:block;margin:0 auto;max-width:100%}
.hud{padding:14px;display:flex;justify-content:space-between;font-size:1.1em}
.btn{display:inline-block;margin:10px 6px;padding:10px 18px;background:#fff;color:#111;border-radius:8px;text-decoration:none;border:none;cursor:pointer;font-weight:600}
#msg{margin-top:10px;min-height:28px}
</style></head>
<body>
<div class="wrap">
<div class="hud"><span>🏎️ Car Race</span><span>Точки: <b id="pts">0</b> | Ниво: <b id="lvl">1</b></span></div>
<canvas id="cv" width="500" height="600"></canvas>
<div id="msg">←/→ стрелки или клик (ляво/дясно половина). Избягвай насрещните коли!</div>
<a class="btn" href="/portals/games/">← Игри</a>
<button class="btn" id="r">🔁 Рестарт</button>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const LANES=[120,250,380];
let car,enemies,points,level,running,tick,laneIdx;
function reset(){laneIdx=1;car={x:LANES[1],y:500,w:38,h:60};enemies=[];points=0;level=1;tick=0;running=true;document.getElementById('pts').textContent=0;document.getElementById('lvl').textContent=1;document.getElementById('msg').textContent='Карай!';loop();}
function move(d){laneIdx=Math.max(0,Math.min(2,laneIdx+d));}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move(-1);if(e.key==='ArrowRight')move(1);});
cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect();const x=(e.clientX-r.left)*(500/r.width);move(x<250?-1:1);});
document.getElementById('r').onclick=reset;
function spawn(){enemies.push({lane:Math.floor(Math.random()*3),y:-80,s:3+level*.5});}
function loop(){
  if(!running)return;tick++;if(tick%(Math.max(20,60-level*3))===0)spawn();
  ctx.clearRect(0,0,500,600);
  // пътни линии
  ctx.strokeStyle='#ffb';ctx.setLineDash([20,20]);ctx.lineWidth=3;ctx.lineDashOffset=-tick*4;
  ctx.beginPath();ctx.moveTo(170,0);ctx.lineTo(170,600);ctx.moveTo(330,0);ctx.lineTo(330,600);ctx.stroke();
  ctx.setLineDash([]);
  // врагове
  for(const en of enemies){
    en.y+=en.s;
    drawCar(LANES[en.lane],en.y,'#e33');
    if(en.lane===laneIdx && Math.abs(en.y-car.y)<55){running=false;document.getElementById('msg').innerHTML=`💥 Край! Точки: <b>${points}</b>`;submitScore();return;}
  }
  for(let i=enemies.length-1;i>=0;i--)if(enemies[i].y>650){enemies.splice(i,1);points++;document.getElementById('pts').textContent=points;if(points>0&&points%8===0){level++;document.getElementById('lvl').textContent=level;document.getElementById('msg').innerHTML=`🎉 Ниво ${level}! Точки: <b>${points}</b>`;}}
  car.x+=(LANES[laneIdx]-car.x)*.25;
  drawCar(car.x,car.y,'#4cf');
  requestAnimationFrame(loop);
}
function drawCar(x,y,c){ctx.save();ctx.translate(x,y);ctx.fillStyle=c;ctx.fillRect(-18,-30,36,58);ctx.fillStyle='#111';ctx.fillRect(-14,-24,28,18);ctx.fillRect(-18,-32,8,8);ctx.fillRect(10,-32,8,8);ctx.restore();}
async function submitScore(){try{await fetch('/api/portals/games/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_slug:'car-race',score:points,level})});}catch(e){}}
reset();
</script></body></html>
