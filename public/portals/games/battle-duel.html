<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Дуел на ринга | KCY игри</title>
<style>
  body{margin:0;background:#06060a;color:#e8d6a5;font-family:"Cormorant Garamond",Georgia,serif;text-align:center;min-height:100vh;}
  .top{padding:12px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
  .top a{background:linear-gradient(180deg,#2a1a10,#100808);color:#c9a35d;text-decoration:none;padding:8px 14px;border-radius:6px;font-size:.9em;border:1px solid #5a3a1e;letter-spacing:1px;}
  .top a:hover{background:linear-gradient(180deg,#4a2a18,#1a0e08);color:#f8c450;}
  #arena{width:100%;max-width:1280px;margin:14px auto 0;height:calc(100vh - 80px);max-height:960px;}
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0115">
</head>
<body>
<div class="top">
  <a href="/portals/games/" data-i18n="g.all_games">← Всички игри</a>
  <a href="/portals/games/?rank=1" data-i18n="g.leaderboard">🏆 Ранг листа</a>
</div>
<div id="arena"></div>
<script src="/portals/games/battle-heroes-v2.js"></script>
<script src="/portals/games/battle-engine-v2.js"></script>
<script>
var eng = new BattleEngine({
  container: document.getElementById('arena'),
  slug: 'battle-duel',
  title: (window.KCY_I18N?KCY_I18N.t('g.battle_duel_t'):'Дуел на ринга — 1 срещу 1'),
  levels: 10,
  teamSize: 1,
  heroPool: BATTLE_HEROES.duel,
  fieldWidth: 1280,
  fieldHeight: 960,
  mode: 'Duel',
  assetsPath: '/assets/animations/'
});
eng.start();
</script>
    <script src="/shared/js/navigation.js?v=1.0115"></script>
</body>
</html>
