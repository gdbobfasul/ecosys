<!-- Version: 1.0093 -->
<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портал за услуги — KCY</title>
<style>
  :root { --pri:#2a86d8; --sec:#6ec1e4; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,Segoe UI,Roboto,sans-serif; background:#f0f4f8; color:#222; }
  .head { background:linear-gradient(135deg,var(--pri),var(--sec)); color:#fff; padding:40px 20px; text-align:center; }
  .head h1 { font-size:2.2em; margin-bottom:8px; }
  .head a { color:#fff; text-decoration:none; background:rgba(255,255,255,.2); padding:8px 16px; border-radius:8px; display:inline-block; margin-top:12px; font-size:.9em; }
  .grid { max-width:1100px; margin:30px auto; padding:0 20px; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:22px; }
  .svc { background:#fff; border-radius:14px; box-shadow:0 5px 18px rgba(0,0,0,.09); padding:24px; text-decoration:none; color:#333; transition:transform .15s; display:block; }
  .svc:hover { transform:translateY(-4px); }
  .svc .icon { display:inline-block; background:linear-gradient(135deg,var(--pri),var(--sec)); color:#fff; font-weight:700; font-size:.9em; padding:8px 12px; border-radius:8px; margin-bottom:12px; }
  .svc h3 { color:var(--pri); margin-bottom:6px; }
  .svc p { color:#667; font-size:.9em; line-height:1.45; }
  .loading,.err { text-align:center; padding:40px; color:#789; }
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0095">
</head>
<body>
<div class="head">
  <h1>Портал за услуги</h1>
  <p>Полезни инструменти — бързи, безплатни, без изкуствен интелект</p>
  <a href="/">← KCY Ecosystem</a>
  &nbsp;
  <a href="/portals/games/">Портал за игри →</a>
</div>
<div id="grid" class="grid"><div class="loading">Зареждам услугите…</div></div>
<script>
function apiUrl(path){
  var m = location.search.match(/[?&]adm=([^&]+)/);
  return path + (m ? (path.indexOf('?')>-1?'&':'?')+'adm='+m[1] : '');
}
fetch(apiUrl('/api/portals/svc/list'))
  .then(function(r){
    if(r.status===401){ location.href='/portals/login.html?next='+encodeURIComponent(location.pathname); throw 0; }
    if(r.status===402){ location.href='/portals/billing.html'; throw 0; }
    if(!r.ok){ return r.text().then(function(b){ throw new Error('HTTP '+r.status+(b?' — '+b.slice(0,200):'')); }); }
    return r.json();
  })
  .then(function(d){
    var g=document.getElementById('grid');
    g.innerHTML='';
    d.services.forEach(function(s){
      var a=document.createElement('a');
      a.className='svc';
      a.href=s.file;
      a.innerHTML='<span class="icon">'+s.icon+'</span>'+
                  '<h3>'+s.title+'</h3><p>'+s.description+'</p>';
      g.appendChild(a);
    });
  })
  .catch(function(e){
    if(e===0) return;
    document.getElementById('grid').innerHTML='<div class="err">Грешка при зареждане: '+
      String(e && e.message ? e.message : e).replace(/</g,'&lt;')+'</div>';
  });
</script>
    <script src="/shared/js/navigation.js?v=1.0095"></script>
</body>
</html>
