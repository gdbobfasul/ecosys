<!-- Version: 1.0117 -->
<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор на пароли | KCY услуги</title>
<style>
  :root { --pri:#2a86d8; --sec:#6ec1e4; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,Segoe UI,Roboto,sans-serif; background:#f0f4f8; color:#222; }
  .head { background:linear-gradient(135deg,var(--pri),var(--sec)); color:#fff; padding:28px 20px; text-align:center; }
  .head h1 { font-size:1.7em; margin-bottom:6px; }
  .head a { color:#fff; text-decoration:none; background:rgba(255,255,255,.2); padding:6px 14px; border-radius:8px; display:inline-block; margin-top:10px; font-size:.9em; }
  .wrap { max-width:680px; margin:24px auto; padding:0 16px; }
  .card { background:#fff; border-radius:12px; padding:22px; box-shadow:0 4px 16px rgba(0,0,0,.08); }
  label { display:block; font-weight:600; margin:14px 0 6px; font-size:.92em; }
  select,input[type=number] { width:100%; padding:10px; border:1px solid #cdd7e1; border-radius:8px; font-size:1em; }
  .check { display:flex; align-items:center; gap:8px; margin:8px 0; font-weight:400; }
  .check input { width:auto; }
  .btn { background:var(--pri); color:#fff; border:none; padding:11px 20px; border-radius:8px; font-size:1em; cursor:pointer; margin-top:16px; font-weight:600; }
  .btn:hover { background:#1f6cb0; }
  .out { margin-top:18px; padding:16px; background:#1e2733; border-radius:10px; color:#7ee; font-family:monospace; font-size:1.25em; text-align:center; word-break:break-all; cursor:pointer; }
  .strength { height:8px; border-radius:4px; margin-top:10px; background:#dde; }
  .strength div { height:100%; border-radius:4px; transition:.3s; }
  .slabel { font-size:.85em; margin-top:6px; text-align:center; }
  .hint { font-size:.84em; color:#789; margin-top:4px; }
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0115">
</head>
<body>
<div class="head">
  <h1 data-i18n="password.title">Генератор на пароли</h1>
  <p data-i18n="password.subtitle">Силни пароли с различни методи</p>
  <a href="/portals/services/">← Всички услуги</a>
</div>
<div class="wrap">
  <div class="card">
    <label data-i18n="password.method">Метод на генериране</label>
    <select id="method" onchange="onMethod()">
      <option value="random" data-i18n="password.m_random">Случайни символи — максимална сила</option>
      <option value="words" data-i18n="password.m_words">Лесна за запомняне — думи (passphrase)</option>
      <option value="pin" data-i18n="password.m_pin">Цифров PIN код</option>
      <option value="pronounce" data-i18n="password.m_syll">Произносима — срички</option>
    </select>
    <p class="hint" id="mhint"></p>

    <label>Дължина <span id="lenval">16</span></label>
    <input type="number" id="len" value="16" min="4" max="64" oninput="syncLen()">

    <div id="opts">
      <label data-i18n="password.include">Включи символи:</label>
      <div class="check"><input type="checkbox" id="upper" checked><span data-i18n="password.upper">Главни букви (A-Z)</span></div>
      <div class="check"><input type="checkbox" id="lower" checked><span data-i18n="password.lower">Малки букви (a-z)</span></div>
      <div class="check"><input type="checkbox" id="digits" checked><span data-i18n="password.digits">Цифри (0-9)</span></div>
      <div class="check"><input type="checkbox" id="symbols" checked><span data-i18n="password.special">Специални (!@#$%...)</span></div>
      <div class="check"><input type="checkbox" id="nosimilar"><span data-i18n="password.noconfuse">Без объркващи (0/O, 1/l/I)</span></div>
    </div>

    <button class="btn" onclick="gen()" data-i18n="password.generate">Генерирай парола</button>
    <div class="out" id="out" onclick="copyPw()" title="Кликни за копиране">—</div>
    <div class="strength"><div id="sbar" style="width:0"></div></div>
    <div class="slabel" id="slabel"></div>
  </div>
</div>
<script>
var HINTS={
  random:'Случайни символи от избраните набори. Най-силна, но трудна за запомняне.',
  words:'Свързва случайни думи — лесна за запомняне, дълга и силна.',
  pin:'Само цифри — за устройства/карти. По-слаба, използвай дълъг PIN.',
  pronounce:'Редува съгласна+гласна — звучи като дума, по-лесна за изговаряне.'
};
var WORDS=['ябълка','река','планина','облак','книга','стол','прозорец','звезда','море','гора','цвете','камък','вятър','слънце','луна','птица','риба','мост','ключ','врата','лампа','маса','огън','лед','пясък','злато','сребро','диамант','тигър','орел'];
var CONS='bcdfghjklmnprstvz', VOW='aeiou';

function onMethod(){
  var m=document.getElementById('method').value;
  document.getElementById('mhint').textContent=HINTS[m];
  document.getElementById('opts').style.display=(m==='random')?'block':'none';
}
function syncLen(){ document.getElementById('lenval').textContent=document.getElementById('len').value; }

function rnd(max){
  var a=new Uint32Array(1); crypto.getRandomValues(a);
  return a[0]%max;
}
function pick(str){ return str[rnd(str.length)]; }

function gen(){
  var m=document.getElementById('method').value;
  var len=Math.max(4,Math.min(64,parseInt(document.getElementById('len').value,10)||16));
  var pw='';
  if(m==='random'){
    var set='';
    if(document.getElementById('upper').checked) set+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if(document.getElementById('lower').checked) set+='abcdefghijklmnopqrstuvwxyz';
    if(document.getElementById('digits').checked) set+='0123456789';
    if(document.getElementById('symbols').checked) set+='!@#$%^&*()-_=+[]{}';
    if(document.getElementById('nosimilar').checked) set=set.replace(/[0O1lI]/g,'');
    if(!set){ alert('Избери поне един набор символи.'); return; }
    for(var i=0;i<len;i++) pw+=pick(set);
  } else if(m==='words'){
    var n=Math.max(3,Math.round(len/5));
    var parts=[];
    for(var j=0;j<n;j++){
      var w=WORDS[rnd(WORDS.length)];
      parts.push(w.charAt(0).toUpperCase()+w.slice(1));
    }
    pw=parts.join('-')+rnd(100);
  } else if(m==='pin'){
    for(var k=0;k<len;k++) pw+=rnd(10);
  } else if(m==='pronounce'){
    for(var p=0;p<len;p++) pw+=(p%2===0)?pick(CONS):pick(VOW);
    pw=pw.charAt(0).toUpperCase()+pw.slice(1)+rnd(100);
  }
  document.getElementById('out').textContent=pw;
  rateStrength(pw);
}

function rateStrength(pw){
  var score=0;
  if(pw.length>=8) score++;
  if(pw.length>=12) score++;
  if(pw.length>=20) score++;
  if(/[a-z]/.test(pw)&&/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^a-zA-Z0-9]/.test(pw)) score++;
  var pct=Math.min(100,score*17);
  var bar=document.getElementById('sbar');
  bar.style.width=pct+'%';
  var lab,col;
  if(score<=2){ lab='Слаба'; col='#d9534f'; }
  else if(score<=4){ lab='Средна'; col='#f0ad4e'; }
  else { lab='Силна'; col='#5cb85c'; }
  bar.style.background=col;
  document.getElementById('slabel').textContent='Сила: '+lab;
  document.getElementById('slabel').style.color=col;
}
function copyPw(){
  var t=document.getElementById('out').textContent;
  if(t&&t!=='—'){ navigator.clipboard.writeText(t); 
    var o=document.getElementById('out'); var old=o.textContent;
    o.textContent='✓ копирано'; setTimeout(function(){o.textContent=old;},800);
  }
}
onMethod(); gen();
</script>
    <script src="/shared/js/navigation.js?v=1.0115"></script>
</body>
</html>
