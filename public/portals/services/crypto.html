<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>–Т–∞–ї—Г—В–µ–љ –Ї–Њ–љ–≤–µ—А—В–Њ—А | KCY —Г—Б–ї—Г–≥–Є</title>
<style>
  :root { --pri:#2a86d8; --sec:#6ec1e4; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,Segoe UI,Roboto,sans-serif; background:#f0f4f8; color:#222; }
  .head { background:linear-gradient(135deg,var(--pri),var(--sec)); color:#fff; padding:28px 20px; text-align:center; }
  .head h1 { font-size:1.7em; margin-bottom:6px; }
  .head a { color:#fff; text-decoration:none; background:rgba(255,255,255,.2); padding:6px 14px; border-radius:8px; display:inline-block; margin-top:10px; font-size:.9em; }
  .wrap { max-width:680px; margin:24px auto; padding:0 16px; }
  .card { background:#fff; border-radius:12px; padding:22px; box-shadow:0 4px 16px rgba(0,0,0,.08); }
  label { display:block; font-weight:600; margin:14px 0 6px; font-size:.92em; }
  input,select { width:100%; padding:11px; border:1px solid #cdd7e1; border-radius:8px; font-size:1em; }
  .row { display:flex; gap:12px; align-items:flex-end; }
  .row > div { flex:1; }
  .swap { flex:0 0 auto; }
  .swapbtn { background:#5a6b7d; color:#fff; border:none; width:42px; height:42px; border-radius:8px; font-size:1.2em; cursor:pointer; }
  .out { margin-top:20px; padding:18px; background:#eef6ff; border-radius:10px; text-align:center; }
  .out .big { font-size:1.8em; font-weight:700; color:var(--pri); }
  .note { font-size:.8em; color:#789; margin-top:14px; text-align:center; }
  .loading { text-align:center; color:#789; padding:20px; }
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0095">
</head>
<body>
<div class="head">
  <h1>–Т–∞–ї—Г—В–µ–љ –Ї–Њ–љ–≤–µ—А—В–Њ—А</h1>
  <p>–Ъ—А–Є–њ—В–Њ–≤–∞–ї—Г—В–Є –Є —Д–Є–∞—В–љ–Є –≤–∞–ї—Г—В–Є</p>
  <a href="/portals/services/">вЖР –Т—Б–Є—З–Ї–Є —Г—Б–ї—Г–≥–Є</a>
</div>
<div class="wrap">
  <div class="card">
    <div id="loading" class="loading">–Ч–∞—А–µ–ґ–і–∞–Љ –Ї—Г—А—Б–Њ–≤–µвА¶</div>
    <div id="tool" style="display:none">
      <label>–°—Г–Љ–∞</label>
      <input type="number" id="amount" value="1" min="0" step="any" oninput="convert()">
      <div class="row" style="margin-top:8px">
        <div>
          <label>–Ю—В</label>
          <select id="from" onchange="convert()"></select>
        </div>
        <div class="swap">
          <label>&nbsp;</label>
          <button class="swapbtn" onclick="swap()" title="–†–∞–Ј–Љ–µ–љ–Є">вЗЕ</button>
        </div>
        <div>
          <label>–Ъ—К–Љ</label>
          <select id="to" onchange="convert()"></select>
        </div>
      </div>
      <div class="out">
        <div class="big" id="result">вАФ</div>
        <div id="rate" style="color:#567;font-size:.9em;margin-top:6px"></div>
      </div>
      <div class="note" id="note"></div>
    </div>
  </div>
</div>
<script>
var RATES={};  // —Б–Є–Љ–≤–Њ–ї -> —Б—В–Њ–є–љ–Њ—Б—В –≤ USD (1 –µ–і–Є–љ–Є—Ж–∞ = X USD)
var META={};   // —Б–Є–Љ–≤–Њ–ї -> {name, type}

function loadRates(){
  fetch('/api/portals/svc/rates')
    .then(function(r){ if(!r.ok) throw new Error('rates'); return r.json(); })
    .then(function(d){
      // –Ї—А–Є–њ—В–Њ: usd —Ж–µ–љ–∞ –і–Є—А–µ–Ї—В–љ–Њ
      d.crypto.forEach(function(c){
        RATES[c.symbol]=c.usd;
        META[c.symbol]={name:c.name,type:'–Ї—А–Є–њ—В–Њ'};
      });
      // —Д–Є–∞—В: er-api –і–∞–≤–∞ 1 USD = X –≤–∞–ї—Г—В–∞ вЖТ 1 –≤–∞–ї—Г—В–∞ = 1/X USD
      Object.keys(d.fiat).forEach(function(code){
        var perUsd=d.fiat[code];
        if(perUsd>0){
          RATES[code]=1/perUsd;
          META[code]={name:code,type:'–≤–∞–ї—Г—В–∞'};
        }
      });
      RATES['USD']=1; META['USD']={name:'US Dollar',type:'–≤–∞–ї—Г—В–∞'};
      buildSelects();
      document.getElementById('loading').style.display='none';
      document.getElementById('tool').style.display='block';
      document.getElementById('note').textContent=
        '–Ъ—Г—А—Б–Њ–≤–µ –њ–Њ –і–∞–љ–љ–Є –љ–∞ CoinGecko (–Ї—А–Є–њ—В–Њ) –Є ER-API (—Д–Є–∞—В). –Ю–±–љ–Њ–≤–µ–љ–Є: '+
        new Date(d.updated).toLocaleString('bg-BG');
      convert();
    })
    .catch(function(){
      document.getElementById('loading').innerHTML=
        '<span style="color:#d9534f">–Ъ—Г—А—Б–Њ–≤–µ—В–µ –љ–µ –Љ–Њ–ґ–∞—Е–∞ –і–∞ —Б–µ –Ј–∞—А–µ–і—П—В. –Ю–њ–Є—В–∞–є –њ–Њ-–Ї—К—Б–љ–Њ.</span>';
    });
}

function buildSelects(){
  var syms=Object.keys(RATES).sort(function(a,b){
    var ta=META[a].type,tb=META[b].type;
    if(ta!==tb) return ta==='–Ї—А–Є–њ—В–Њ'?-1:1;
    return a<b?-1:1;
  });
  var opts=syms.map(function(s){
    return '<option value="'+s+'">'+s+' вАФ '+META[s].name+' ('+META[s].type+')</option>';
  }).join('');
  var f=document.getElementById('from'), t=document.getElementById('to');
  f.innerHTML=opts; t.innerHTML=opts;
  f.value='BTC'; t.value='USD';
}

function convert(){
  var amt=parseFloat(document.getElementById('amount').value)||0;
  var from=document.getElementById('from').value;
  var to=document.getElementById('to').value;
  if(!RATES[from]||!RATES[to]) return;
  var usd=amt*RATES[from];
  var res=usd/RATES[to];
  document.getElementById('result').textContent=
    fmt(res)+' '+to;
  var one=RATES[from]/RATES[to];
  document.getElementById('rate').textContent=
    '1 '+from+' = '+fmt(one)+' '+to;
}
function fmt(n){
  if(n===0) return '0';
  if(n<0.0001) return n.toExponential(4);
  if(n<1) return n.toFixed(6);
  if(n<1000) return n.toFixed(4);
  return n.toLocaleString('en-US',{maximumFractionDigits:2});
}
function swap(){
  var f=document.getElementById('from'), t=document.getElementById('to');
  var tmp=f.value; f.value=t.value; t.value=tmp;
  convert();
}
loadRates();
</script>
    <script src="/shared/js/navigation.js?v=1.0095"></script>
</body>
</html>
