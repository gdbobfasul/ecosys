<!-- Version: 1.0128 -->
<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Компресор на снимки | KCY услуги</title>
<style>
  :root { --pri:#2a86d8; --sec:#6ec1e4; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,Segoe UI,Roboto,sans-serif; background:#f0f4f8; color:#222; }
  .head { background:linear-gradient(135deg,var(--pri),var(--sec)); color:#fff; padding:28px 20px; text-align:center; }
  .head h1 { font-size:1.7em; margin-bottom:6px; }
  .head a { color:#fff; text-decoration:none; background:rgba(255,255,255,.2); padding:6px 14px; border-radius:8px; display:inline-block; margin-top:10px; font-size:.9em; }
  .wrap { max-width:680px; margin:24px auto; padding:0 16px; }
  .card { background:#fff; border-radius:12px; padding:22px; box-shadow:0 4px 16px rgba(0,0,0,.08); }
  label { display:block; font-weight:600; margin:14px 0 6px; font-size:.92em; }
  input,select { width:100%; padding:10px; border:1px solid #cdd7e1; border-radius:8px; font-size:1em; }
  input[type=range] { padding:0; }
  .btn { background:var(--pri); color:#fff; border:none; padding:11px 20px; border-radius:8px; font-size:1em; cursor:pointer; margin-top:14px; font-weight:600; }
  .cmp { display:flex; gap:12px; margin-top:18px; flex-wrap:wrap; }
  .cmp > div { flex:1; min-width:140px; background:#eef6ff; border-radius:10px; padding:12px; text-align:center; }
  .cmp img { max-width:100%; max-height:160px; border-radius:6px; }
  .sz { font-weight:700; color:var(--pri); margin-top:6px; }
  .save { text-align:center; margin-top:8px; font-size:1.05em; color:#5cb85c; font-weight:700; }
  .hint { font-size:.84em; color:#789; margin-top:4px; }
</style>
    <link rel="stylesheet" href="/shared/css/common.css?v=1.0115">
</head>
<body>
<div class="head">
  <h1 data-i18n="image.title">Компресор на снимки</h1>
  <p data-i18n="image.subtitle">Намали размера на JPEG / PNG / WebP</p>
  <a href="/portals/services/" data-i18n="common.all_services">← Всички услуги</a>
</div>
<div class="wrap">
  <div class="card">
    <label data-i18n="image.choose">Избери изображение</label>
    <input type="file" id="file" accept="image/jpeg,image/png,image/webp" onchange="loadImg()">
    <label><span data-i18n="image.quality">Качество</span> <span id="qval">75%</span></label>
    <input type="range" id="quality" min="10" max="100" value="75" oninput="document.getElementById('qval').textContent=this.value+'%'">
    <label data-i18n="image.format">Изходен формат</label>
    <select id="format">
      <option value="image/jpeg" data-i18n="image.fmt_jpeg">JPEG — най-малък размер</option>
      <option value="image/webp" data-i18n="image.fmt_webp">WebP — модерен, добро качество</option>
      <option value="image/png" data-i18n="image.fmt_png">PNG — без загуба (за графики)</option>
    </select>
    <label data-i18n="image.maxwidth">Максимална ширина (px, 0 = запази оригинала)</label>
    <input type="number" id="maxw" value="0" min="0">
    <p class="hint" data-i18n="r.44">Компресията се прави изцяло в браузъра — снимката не се качва никъде.</p>
    <button class="btn" onclick="compress()" data-i18n="image.compress">Компресирай</button>
    <div class="cmp" id="cmp" style="display:none">
      <div>
        <div data-i18n="image.original">Оригинал</div>
        <img id="origImg"><div class="sz" id="origSz"></div>
      </div>
      <div>
        <div data-i18n="image.compressed">Компресирано</div>
        <img id="compImg"><div class="sz" id="compSz"></div>
        <button class="btn" onclick="dl()" data-i18n="common.download">Свали</button>
      </div>
    </div>
    <div class="save" id="save"></div>
  </div>
</div>
<script>
var origFile=null, compBlob=null;
function fmtSize(b){
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(2)+' MB';
}
function loadImg(){
  var f=document.getElementById('file').files[0];
  if(!f) return;
  origFile=f;
}
function compress(){
  if(!origFile){ alert(KCY_I18N.t('image.choose_first')); return; }
  var img=new Image();
  img.onload=function(){
    var maxw=parseInt(document.getElementById('maxw').value,10)||0;
    var w=img.width, h=img.height;
    if(maxw>0 && w>maxw){ h=Math.round(h*maxw/w); w=maxw; }
    var c=document.createElement('canvas');
    c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    var fmt=document.getElementById('format').value;
    var q=parseInt(document.getElementById('quality').value,10)/100;
    c.toBlob(function(blob){
      compBlob=blob;
      document.getElementById('cmp').style.display='flex';
      document.getElementById('origImg').src=URL.createObjectURL(origFile);
      document.getElementById('compImg').src=URL.createObjectURL(blob);
      document.getElementById('origSz').textContent=fmtSize(origFile.size);
      document.getElementById('compSz').textContent=fmtSize(blob.size);
      var saved=100-Math.round(blob.size/origFile.size*100);
      document.getElementById('save').textContent=
        saved>0 ? (KCY_I18N.t('image.saved')+saved+'% от размера') :
                  KCY_I18N.t('image.no_reduce');
    }, fmt, q);
  };
  img.src=URL.createObjectURL(origFile);
}
function dl(){
  if(!compBlob) return;
  var ext=document.getElementById('format').value.split('/')[1];
  var a=document.createElement('a');
  a.download='compressed.'+ext;
  a.href=URL.createObjectURL(compBlob);
  a.click();
}
</script>
    <script src="/shared/js/navigation.js?v=1.0115"></script>
</body>
</html>
