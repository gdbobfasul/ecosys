<!-- Version: 1.0243 -->
<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="report.title">Докладвай грешка — Pupikes</title>
  <link rel="stylesheet" href="/shared/css/common.css?v=1.0176">
  <style>
    body { background: #f5f7fa; }
    .wrap { max-width: 680px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,.10); }
    h1 { color: #ee5a6f; margin-bottom: 6px; font-size: 1.6em; }
    .sub { color: #667; font-size: .92em; margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin: 16px 0 6px; color: #334; }
    input[type=text], textarea { width: 100%; padding: 12px; border: 1px solid #d0d7de; border-radius: 8px; font-size: 15px; font-family: inherit; box-sizing: border-box; }
    textarea { min-height: 180px; resize: vertical; }
    .count { font-size: .8em; color: #889; text-align: right; margin-top: 4px; }
    .btn-submit { margin-top: 20px; width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a6f); color: #fff; font-weight: 700; font-size: 1.05em; cursor: pointer; }
    .btn-submit:hover { opacity: .9; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
    .msg.ok { background: #e7f5e7; color: #1a5; display: block; }
    .msg.err { background: #fdecea; color: #c0392b; display: block; }
    .note { background: #fff8e1; border-left: 4px solid #ffca28; padding: 12px; border-radius: 8px; font-size: .9em; color: #6b5b00; margin-bottom: 18px; }
    .existing { background: #eef4ff; border-left: 4px solid #1e88e5; padding: 12px; border-radius: 8px; font-size: .9em; color: #234; margin-bottom: 18px; display: none; }
    .links { margin-top: 18px; text-align: center; }
    .links a { color: #1e88e5; text-decoration: none; font-size: .9em; }
    .loading { text-align: center; padding: 60px; color: #889; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 data-i18n="report.h1">🐞 Докладвай грешка</h1>
    <div class="sub" data-i18n="report.sub">Опиши проблема, който си срещнал в платформата. Само за регистрирани потребители в Portals.</div>

    <div id="loading" class="loading" data-i18n="common.loading">Зареждам…</div>

    <div id="form-area" style="display:none">
      <div class="note" data-i18n="report.note">ℹ️ Имаш право на <b>един</b> доклад. Ако вече си пускал — формата е попълнена и можеш да я <b>редактираш</b>. Без снимки — само заглавие и текст.</div>
      <div id="existing" class="existing"></div>

      <label for="title" data-i18n="report.label_title">Заглавие</label>
      <input type="text" id="title" maxlength="200" data-i18n-attr="placeholder:report.ph_title" placeholder="Кратко описание на грешката">
      <div class="count"><span id="tcount">0</span>/200</div>

      <label for="body" data-i18n="report.label_body">Описание</label>
      <textarea id="body" maxlength="5000" data-i18n-attr="placeholder:report.ph_body" placeholder="Какво се случи? На коя страница? Какво очакваше да стане?"></textarea>
      <div class="count"><span id="bcount">0</span>/5000</div>

      <button class="btn-submit" id="submit" data-i18n="report.submit">Изпрати доклада</button>
      <div id="msg" class="msg"></div>

      <div class="links"><a href="/" data-i18n="report.back">← Към началото</a></div>
    </div>
  </div>

  <script>
    var titleEl, bodyEl, msgEl, submitEl;

    // Защитен превод — i18n.js се зарежда асинхронно (инжектира се от navigation.js),
    // затова не извикваме KCY_I18N директно (иначе ReferenceError, ако още не е готов).
    function T(key, fb) { return (window.KCY_I18N && KCY_I18N.t) ? KCY_I18N.t(key) : fb; }

    function showMsg(text, kind) { msgEl.textContent = text; msgEl.className = 'msg ' + (kind || 'err'); }

    document.addEventListener('DOMContentLoaded', function () {
      titleEl = document.getElementById('title');
      bodyEl = document.getElementById('body');
      msgEl = document.getElementById('msg');
      submitEl = document.getElementById('submit');

      titleEl.addEventListener('input', function () { document.getElementById('tcount').textContent = titleEl.value.length; });
      bodyEl.addEventListener('input', function () { document.getElementById('bcount').textContent = bodyEl.value.length; });

      // 1) Проверка за логин
      fetch('/api/portals/me', { credentials: 'same-origin' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d || !d.logged_in) {
            location.href = '/portals/login.html?next=' + encodeURIComponent('/portals/report-bug.html');
            return;
          }
          // 2) Зареди съществуващ доклад (за редакция)
          return fetch('/api/portals/bug-report/mine', { credentials: 'same-origin' })
            .then(function (r) { return r.ok ? r.json() : { report: null }; })
            .then(function (data) {
              document.getElementById('loading').style.display = 'none';
              document.getElementById('form-area').style.display = '';
              if (data && data.report) {
                titleEl.value = data.report.title || '';
                bodyEl.value = data.report.body || '';
                document.getElementById('tcount').textContent = titleEl.value.length;
                document.getElementById('bcount').textContent = bodyEl.value.length;
                var ex = document.getElementById('existing');
                ex.style.display = 'block';
                ex.textContent = T('report.existing_pre', '✏️ Вече имаш доклад (последна промяна: ') + (data.report.updated_at || data.report.created_at) + T('report.existing_post', '). Промени го и натисни „Запази промените".');
                submitEl.textContent = T('report.save_changes', 'Запази промените');
              }
            });
        })
        .catch(function () {
          document.getElementById('loading').textContent = T('report.load_error', 'Грешка при зареждане.');
        });

      // 3) Изпращане (upsert)
      submitEl.addEventListener('click', function () {
        var title = titleEl.value.trim(), body = bodyEl.value.trim();
        if (!title) { showMsg(T('report.need_title', 'Въведи заглавие.'), 'err'); return; }
        if (!body) { showMsg(T('report.need_body', 'Въведи описание.'), 'err'); return; }
        submitEl.disabled = true;
        fetch('/api/portals/bug-report', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: title, body: body })
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
          .then(function (res) {
            submitEl.disabled = false;
            if (res.ok) {
              showMsg(T('report.success', '✅ Благодарим! Докладът е записан. Можеш да го редактираш по всяко време от същия бутон.'), 'ok');
              submitEl.textContent = T('report.save_changes', 'Запази промените');
            } else {
              showMsg(res.d.message || res.d.error || T('report.save_error', 'Грешка при записа.'), 'err');
            }
          })
          .catch(function (e) { submitEl.disabled = false; showMsg(T('report.network_error', 'Мрежова грешка: ') + e.message, 'err'); });
      });
    });
  </script>

  <!-- Хедър/меню + език — както в останалите портал-страници (navigation.js инжектира nav-а и зарежда i18n.js). -->
  <script src="/shared/js/navigation.js?v=1.0195"></script>
  <script src="/shared/js/kg-compliance.js?v=1.0001"></script>
</body>
</html>
