<!-- Version: 1.0197 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="zp.title">Zero Price — what you can't find</title>
  <style>
    :root { --bg:#0f1720; --panel:#16212c; --line:#26323d; --ink:#e6edf3; --muted:#94a6b6; --accent:#2bb673; --accent2:#2bb6a8; }
    * { box-sizing:border-box; } body { margin:0; font-family:system-ui,"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--ink); }
    header { background:linear-gradient(135deg,#11806a,#1c5a8f); padding:16px 20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    header h1 { font-size:18px; margin:0; } header .spacer{ flex:1; }
    header a.btn { color:#fff; text-decoration:none; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.35); padding:8px 14px; border-radius:8px; font-weight:600; font-size:14px; }
    header select { width:auto; flex:0 0 auto; background:#0d2a3a; color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:8px; padding:7px 9px; font-size:14px; }
    main { max-width:820px; margin:0 auto; padding:20px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:16px; }
    h2 { font-size:16px; margin:0 0 12px; } .hint { color:var(--muted); font-size:13px; margin:0 0 12px; }
    label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
    input, select, textarea { width:100%; padding:10px; border-radius:8px; border:1px solid var(--line); background:#0e1822; color:var(--ink); font-size:14px; font-family:inherit; }
    textarea { min-height:64px; resize:vertical; }
    .two { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    button { background:var(--accent); color:#04210f; border:none; padding:11px 18px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; margin-top:12px; }
    button.ghost { background:transparent; color:var(--accent); border:1px solid var(--accent); margin-top:0; padding:7px 12px; font-size:13px; }
    .tabs { display:flex; gap:8px; margin-bottom:10px; } .tabs button { margin:0; padding:8px 14px; font-size:14px; }
    .msg { font-size:13px; margin-top:10px; } .msg.ok { color:#5fd39a; } .msg.err { color:#f0883e; }
    .req { border-top:1px solid var(--line); padding:12px 0; }
    .req .t { font-weight:700; font-size:15px; } .req .meta { color:var(--muted); font-size:12px; margin-top:2px; }
    .badge { display:inline-block; background:#0e2a22; color:var(--accent2); border:1px solid #1c4a3e; border-radius:20px; padding:2px 10px; font-size:12px; }
    .offers { margin-top:10px; padding-left:10px; border-left:2px solid var(--line); }
    .offer { font-size:13px; padding:6px 0; color:#cdd; } .offer .p { color:var(--accent2); font-weight:700; }
    .sys { opacity:.7; } .me { font-size:13px; color:var(--accent2); }
    [disabled] { opacity:.6; }
  </style>
</head>
<body>
  <header>
    <h1 data-i18n="zp.title">Zero Price — what you can't find</h1>
    <span class="spacer"></span>
    <select id="lang" title="Language"></select>
    <a class="btn" href="index.html" data-i18n="nav.home">Home</a>
  </header>

  <main>
    <div class="card">
      <p class="hint" data-i18n="zp.intro">Publish what you cannot find in your country. People from other places tell you the price, send an offer, or explain where to get it.</p>
    </div>

    <!-- Акаунт: вход / регистрация -->
    <div class="card" id="authCard">
      <div id="loggedOut">
        <div class="tabs">
          <button id="tabLogin" data-i18n="common.login">Log in</button>
          <button id="tabReg" class="ghost" data-i18n="common.register">Register</button>
        </div>
        <label>Email</label><input id="a_email" type="email" autocomplete="email">
        <label data-i18n="zp.password">Password</label><input id="a_pass" type="password" autocomplete="current-password">
        <input id="a_name" placeholder="Display name (register only)" style="display:none">
        <button id="btnAuth" data-i18n="common.login">Log in</button>
        <div id="authMsg" class="msg"></div>
      </div>
      <div id="loggedIn" style="display:none">
        <span class="me" id="meLabel"></span>
        <button class="ghost" id="btnLogout" style="margin-left:10px" data-i18n="zp.logout">Log out</button>
      </div>
    </div>

    <!-- Публикувай заявка -->
    <div class="card">
      <h2 data-i18n="zp.publish">Publish what you're looking for</h2>
      <label data-i18n="zp.what">What are you looking for?</label>
      <input id="w_title" placeholder="e.g. left-handed scissors, spare part X...">
      <label data-i18n="zp.details">Details (optional)</label>
      <textarea id="w_desc" placeholder="model, brand, specifics..."></textarea>
      <div class="two">
        <div><label data-i18n="zp.country">Your country</label><select id="w_country"></select></div>
        <div><label data-i18n="zp.city">City (optional)</label><select id="w_city" disabled></select></div>
      </div>
      <button id="btnPublish" data-i18n="zp.publish_btn">Publish request</button>
      <div id="pubMsg" class="msg"></div>
    </div>

    <!-- Списък със заявки -->
    <div class="card">
      <h2 data-i18n="zp.browse">What people are looking for</h2>
      <div id="list"></div>
    </div>
  </main>

  <script src="js/i18n.js?v=1.0197"></script>
  <script>
    var ME = null, COUNTRIES = [], authMode = 'login';
    function T(k, d) { return (window.FBP_I18N && FBP_I18N.t) ? (function(v){ return v === k ? (d || k) : v; })(FBP_I18N.t(k)) : (d || k); }
    function esc(s) { return String(s == null ? '' : s).replace(/[<>&"]/g, function (c) { return ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' })[c]; }); }
    function $(id) { return document.getElementById(id); }
    function msg(el, t, k) { el.textContent = t; el.className = 'msg ' + (k || 'err'); }

    // ── Език ──
    function populateLang() {
      var sel = $('lang'); if (!sel || !window.FBP_I18N) return;
      sel.innerHTML = FBP_I18N.supported.map(function (l) { return '<option value="' + l.code + '"' + (l.code === FBP_I18N.lang ? ' selected' : '') + '>' + esc(l.name) + '</option>'; }).join('');
      sel.onchange = function () { FBP_I18N.set(this.value); };
    }

    // ── География: държава → град (от /shared/geo) ──
    async function loadCountries() {
      try { COUNTRIES = await (await fetch('/shared/geo/countries.json')).json(); } catch (e) { COUNTRIES = []; }
      var optsBlank = '<option value="">' + T('zp.country', 'Country') + '…</option>';
      var opts = optsBlank + COUNTRIES.map(function (c) { return '<option value="' + c.slug + '" data-name="' + esc(c.name) + '">' + esc(c.name) + '</option>'; }).join('');
      $('w_country').innerHTML = opts;
    }
    async function loadCities(sel, slug, preselect) {
      sel.innerHTML = '<option value="">…</option>'; sel.disabled = true;
      if (!slug) return;
      try {
        var cities = await (await fetch('/shared/geo/cities/' + slug + '.json')).json();
        sel.innerHTML = '<option value="">' + T('zp.city', 'City') + '…</option>' + (cities || []).map(function (c) { return '<option' + (c === preselect ? ' selected' : '') + '>' + esc(c) + '</option>'; }).join('');
        sel.disabled = !(cities && cities.length);
      } catch (e) { sel.disabled = true; }
    }
    $('w_country').addEventListener('change', function () { loadCities($('w_city'), this.value); });
    function countryName(sel) { var o = sel.options[sel.selectedIndex]; return o ? (o.getAttribute('data-name') || o.value) : ''; }
    function selectCountryByName(sel, name, cb) {
      for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].getAttribute('data-name') === name) { sel.selectedIndex = i; if (cb) cb(sel.options[i].value); return; } }
    }

    // ── Акаунт ──
    async function whoami() {
      try { var r = await fetch('/api/fbp/me'); if (r.ok) { var d = await r.json(); ME = d.user || d; } } catch (e) {}
      $('loggedOut').style.display = ME ? 'none' : 'block';
      $('loggedIn').style.display = ME ? 'block' : 'none';
      if (ME) { $('meLabel').textContent = '✓ ' + (ME.display_name || ME.email || ''); autofillLocation(); }
    }
    async function autofillLocation() {
      try {
        var r = await fetch('/api/fbp/business/mine'); if (!r.ok) return;
        var d = await r.json(); var biz = (d.businesses || d)[0]; if (!biz || !biz.country) return;
        selectCountryByName($('w_country'), biz.country, function (slug) { loadCities($('w_city'), slug, biz.city || null); });
      } catch (e) {}
    }
    $('tabLogin').addEventListener('click', function () { authMode = 'login'; $('tabLogin').classList.remove('ghost'); $('tabReg').classList.add('ghost'); $('a_name').style.display = 'none'; $('btnAuth').textContent = T('common.login', 'Log in'); });
    $('tabReg').addEventListener('click', function () { authMode = 'register'; $('tabReg').classList.remove('ghost'); $('tabLogin').classList.add('ghost'); $('a_name').style.display = 'block'; $('btnAuth').textContent = T('common.register', 'Register'); });
    $('btnAuth').addEventListener('click', async function () {
      var m = $('authMsg'), body = { email: $('a_email').value.trim(), password: $('a_pass').value };
      if (authMode === 'register') body.display_name = $('a_name').value.trim() || null;
      try {
        var r = await fetch('/api/fbp/' + authMode, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        var d = await r.json();
        if (!r.ok) { msg(m, d.message || d.error); return; }
        msg(m, '✓', 'ok'); await whoami();
      } catch (e) { msg(m, e.message); }
    });
    $('btnLogout').addEventListener('click', async function () { await fetch('/api/fbp/logout', { method: 'POST' }); ME = null; whoami(); });

    // ── Заявки ──
    async function loadList() {
      var box = $('list'); box.innerHTML = '<p class="hint">…</p>';
      try {
        var d = await (await fetch('/api/fbp/wanted')).json();
        var reqs = d.requests || [];
        if (!reqs.length) { box.innerHTML = '<p class="hint">' + T('zp.empty', 'No requests yet. Be the first to publish.') + '</p>'; return; }
        box.innerHTML = reqs.map(function (w) {
          return '<div class="req' + (w.is_system ? ' sys' : '') + '">' +
            '<div class="t">' + esc(w.title) + '</div>' +
            '<div class="meta">📍 ' + esc(w.country) + (w.city ? ', ' + esc(w.city) : '') + ' · ' + esc(w.requester) +
            ' · <span class="badge">' + (w.offer_count || 0) + ' ' + T('zp.offers', 'offers') + '</span></div>' +
            (w.description ? '<div class="meta">' + esc(w.description) + '</div>' : '') +
            '<button class="ghost" data-open="' + w.id + '" style="margin-top:8px">' + T('zp.view_offers', 'View / add offer') + '</button>' +
            '<div class="offers" id="off-' + w.id + '" style="display:none"></div></div>';
        }).join('');
        box.querySelectorAll('[data-open]').forEach(function (b) { b.addEventListener('click', function () { toggleOffers(b.dataset.open); }); });
      } catch (e) { box.innerHTML = '<p class="msg err">' + esc(e.message) + '</p>'; }
    }
    async function toggleOffers(id) {
      var el = $('off-' + id);
      if (el.style.display === 'block') { el.style.display = 'none'; return; }
      el.style.display = 'block'; el.innerHTML = '<p class="hint">…</p>';
      try {
        var d = await (await fetch('/api/fbp/wanted/' + id)).json();
        var offers = d.offers || [];
        var html = offers.length ? offers.map(function (o) {
          var price = (o.price != null) ? '<span class="p">' + esc(o.price) + ' ' + esc(o.currency || '') + '</span> · ' : '';
          return '<div class="offer">' + price + (o.where_country ? '📦 ' + esc(o.where_country) + ' · ' : '') + esc(o.note) + ' — <i>' + esc(o.responder) + '</i></div>';
        }).join('') : '<div class="hint">' + T('zp.no_offers', 'No offers yet.') + '</div>';
        html += '<div style="margin-top:8px">' +
          '<div class="two"><input id="o_price-' + id + '" type="number" min="0" step="0.01" placeholder="' + T('zp.price', 'price (optional)') + '">' +
          '<input id="o_cur-' + id + '" value="USD"></div>' +
          '<select id="o_where-' + id + '" style="margin-top:8px"></select>' +
          '<input id="o_note-' + id + '" placeholder="' + T('zp.note', 'note / link / explanation') + '" style="margin-top:8px">' +
          '<button class="ghost" data-offer="' + id + '" style="margin-top:8px">' + T('zp.send_offer', 'Send offer') + '</button>' +
          '<div class="msg" id="omsg-' + id + '"></div></div>';
        el.innerHTML = html;
        // държава за офертата (география)
        var ws = $('o_where-' + id);
        ws.innerHTML = '<option value="">' + T('zp.where', 'where is it available?') + '</option>' + COUNTRIES.map(function (c) { return '<option>' + esc(c.name) + '</option>'; }).join('');
        el.querySelector('[data-offer]').addEventListener('click', function () { sendOffer(id); });
      } catch (e) { el.innerHTML = '<p class="msg err">' + esc(e.message) + '</p>'; }
    }
    async function sendOffer(id) {
      var m = $('omsg-' + id);
      var body = { price: $('o_price-' + id).value, currency: $('o_cur-' + id).value || 'USD', where_country: $('o_where-' + id).value, note: $('o_note-' + id).value };
      try {
        var r = await fetch('/api/fbp/wanted/' + id + '/offer', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        var d = await r.json();
        if (r.status === 401) { msg(m, T('zp.login_first', 'Log in first.')); return; }
        if (!r.ok) { msg(m, d.message || d.error); return; }
        msg(m, T('zp.offer_sent', 'Offer sent!'), 'ok'); loadList();
      } catch (e) { msg(m, e.message); }
    }
    $('btnPublish').addEventListener('click', async function () {
      var m = $('pubMsg');
      var body = { title: $('w_title').value, description: $('w_desc').value, country: countryName($('w_country')), city: $('w_city').value };
      if (!ME) { msg(m, T('zp.login_first', 'Log in or register above first.')); return; }
      try {
        var r = await fetch('/api/fbp/wanted', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        var d = await r.json();
        if (r.status === 401) { msg(m, T('zp.login_first', 'Log in or register above first.')); return; }
        if (!r.ok) { msg(m, d.message || d.error); return; }
        msg(m, T('zp.published', 'Published!'), 'ok'); $('w_title').value = ''; $('w_desc').value = ''; loadList();
      } catch (e) { msg(m, e.message); }
    });

    // ── Старт: чакай i18n да е готов, после рендвай (иначе ключовете изскачат) ──
    function boot() { populateLang(); loadCountries().then(whoami); loadList(); }
    if (window.FBP_I18N && FBP_I18N.ready && FBP_I18N.ready.then) FBP_I18N.ready.then(boot); else window.addEventListener('load', boot);
    document.addEventListener('fbp-lang-ready', function () { populateLang(); loadList(); });
  </script>
  <script src="/shared/js/kg-compliance.js?v=1.0001"></script>
</body>
</html>
