<!-- Version: 1.0093 -->
<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Търсачки - AMS Chat</title>
  <link rel="manifest" href="../assets/manifest.json">
  <link rel="icon" type="image/png" href="../assets/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  
  <div class="container mx-auto px-4 py-8 max-w-4xl">
    
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <button onclick="window.location.href='chat.html'" class="text-blue-400 hover:text-blue-300">
        ← Назад към чата
      </button>
      <h1 class="text-2xl font-bold">🔍 Търсачки</h1>
      <div class="w-32"></div> <!-- Spacer -->
    </div>

    <!-- Tab Navigation -->
    <div class="flex gap-2 mb-8">
      <button
        id="tabDistance"
        onclick="showTab('distance')"
        class="flex-1 py-3 rounded font-semibold transition-colors bg-blue-600 text-white"
      >
        🌍 По разстояние
      </button>
      <button
        id="tabNeed"
        onclick="showTab('need')"
        class="flex-1 py-3 rounded font-semibold transition-colors bg-gray-700 text-gray-300"
      >
        🔍 По нужда
      </button>
    </div>

    <!-- Search by Distance -->
    <div id="distanceSearch" class="space-y-6">
      <div class="bg-gray-800 rounded-lg p-6">
        <h2 class="text-xl font-bold mb-4">🌍 Търсене по разстояние (0-40,000км)</h2>

        <!-- Location Status -->
        <div id="distanceLocation" class="bg-gray-700 rounded p-4 mb-6 text-center">
          <p class="text-gray-400" data-i18n="cs.getting_loc">Получаване на локация...</p>
        </div>

        <!-- Distance Range -->
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.min_km">Минимум (км)</label>
            <input type="number" id="distanceMin" value="0" min="0" max="40000"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.max_km">Максимум (км)</label>
            <input type="number" id="distanceMax" value="50" min="0" max="40000"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
        </div>

        <!-- Filters -->
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.min_age">Мин възраст</label>
            <input type="number" id="distanceMinAge" placeholder="18"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.max_age">Макс възраст</label>
            <input type="number" id="distanceMaxAge" placeholder="99"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.gender">Пол</label>
            <select id="distanceGender" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
              <option value="" data-i18n="cs.all">Всички</option>
              <option value="male" data-i18n="cs.male">Мъж</option>
              <option value="female" data-i18n="cs.female">Жена</option>
            </select>
          </div>
          <div></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.min_h">Мин ръст (см)</label>
            <input type="number" id="distanceMinHeight" placeholder="150"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.max_h">Макс ръст (см)</label>
            <input type="number" id="distanceMaxHeight" placeholder="200"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
        </div>

        <button onclick="searchByDistance()" class="w-full bg-blue-600 hover:bg-blue-700 rounded py-3 font-semibold">
          🔍 Търси
        </button>
      </div>

      <!-- Distance Results -->
      <div id="distanceResults" class="hidden">
        <h3 class="text-lg font-bold mb-4">Резултати: <span id="distanceCount">0</span></h3>
        <div id="distanceResultsList" class="space-y-4"></div>
      </div>
    </div>

    <!-- Search by Need -->
    <div id="needSearch" class="hidden space-y-6">
      <div class="bg-gray-800 rounded-lg p-6">
        <h2 class="text-xl font-bold mb-4">🔍 Търсене по нужда (макс 50км)</h2>

        <div class="bg-blue-900 border border-blue-600 rounded p-4 mb-6">
          <p class="text-blue-300 text-sm">
            ℹ️ Търси хора, които <strong data-i18n="cs.they_offer">ПРЕДЛАГАТ</strong> това, от което <strong data-i18n="cs.you_need">ИМАШ НУЖДА</strong>
          </p>
          <p class="text-blue-300 text-sm mt-2">📍 Максимум 50км радиус (фиксиран)</p>
        </div>

        <!-- Location Status -->
        <div id="needLocation" class="bg-gray-700 rounded p-4 mb-6 text-center">
          <p class="text-gray-400">Получаване на локация...</p>
        </div>

        <!-- Need Selection -->
        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.what_need">От какво имам нужда?</label>
          <select id="needCategory" onchange="updateNeedSubcategories()"
            class="w-full bg-gray-700 rounded px-4 py-2 text-white mb-2">
            <option value="">-- Избери категория --</option>
          </select>
          <select id="needSubcategory" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
            <option value="">-- Избери нужда --</option>
          </select>
        </div>

        <!-- Filters -->
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.min_age_opt">Мин възраст (опц.)</label>
            <input type="number" id="needMinAge" placeholder="18"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.max_age_opt">Макс възраст (опц.)</label>
            <input type="number" id="needMaxAge" placeholder="99"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.gender_opt">Пол (опц.)</label>
            <select id="needGender" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
              <option value="">Всички</option>
              <option value="male">Мъж</option>
              <option value="female">Жена</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.city_opt">Град (опц.)</label>
            <input type="text" id="needCity" placeholder="София"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.min_h_opt">Мин ръст (опц.)</label>
            <input type="number" id="needMinHeight" placeholder="150"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-2" data-i18n="cs.max_h_opt">Макс ръст (опц.)</label>
            <input type="number" id="needMaxHeight" placeholder="200"
              class="w-full bg-gray-700 rounded px-4 py-2 text-white" />
          </div>
        </div>

        <button onclick="searchByNeed()" class="w-full bg-blue-600 hover:bg-blue-700 rounded py-3 font-semibold">
          🔍 Търси
        </button>
      </div>

      <!-- Need Results -->
      <div id="needResults" class="hidden">
        <h3 class="text-lg font-bold mb-4">Резултати: <span id="needCount">0</span> (макс 50км)</h3>
        <div id="needResultsList" class="space-y-4"></div>
      </div>
    </div>

  </div>

  <script src="/configs/config.js"></script>
  <script>
    let distanceLocation = null;
    let needLocation = null;
    let serviceCategories = {};

    // Get location for both searches
    function getLocation(type) {
      const statusDiv = document.getElementById(`${type}Location`);
      
      if (!navigator.geolocation) {
        statusDiv.innerHTML = '<p class="text-red-400">❌ Геолокация не се поддържа</p>';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const location = {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude
          };
          
          if (type === 'distance') distanceLocation = location;
          else needLocation = location;

          statusDiv.innerHTML = `
            <p class="text-green-400">✅ Локация получена</p>
            <p class="text-gray-400 text-sm mt-1">
              ${location.latitude.toFixed(4)}, ${location.longitude.toFixed(4)}
            </p>
          `;
        },
        (error) => {
          statusDiv.innerHTML = `
            <p class="text-red-400">❌ Грешка: ${error.message}</p>
            <button onclick="getLocation('${type}')" class="mt-2 text-blue-400 underline">
              Опитай отново
            </button>
          `;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // Load service categories
    async function loadServiceCategories() {
      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/profile/service-categories`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        serviceCategories = data.all;

        // Populate need category dropdown
        const needCat = document.getElementById('needCategory');
        Object.keys(serviceCategories).forEach(key => {
          const opt = document.createElement('option');
          opt.value = key;
          opt.textContent = serviceCategories[key].label;
          needCat.appendChild(opt);
        });
      } catch (err) {
        console.error('Load categories error:', err);
      }
    }

    function updateNeedSubcategories() {
      const category = document.getElementById('needCategory').value;
      const select = document.getElementById('needSubcategory');
      
      select.innerHTML = '<option value="">-- Избери нужда --</option>';
      
      if (!category) return;
      
      serviceCategories[category].subcategories.forEach(sub => {
        const opt = document.createElement('option');
        opt.value = sub;
        opt.textContent = sub;
        select.appendChild(opt);
      });
    }

    // Search by distance
    async function searchByDistance() {
      if (!distanceLocation) {
        alert('Моля, разрешете достъп до локация');
        return;
      }

      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/search/by-distance`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            latitude: distanceLocation.latitude,
            longitude: distanceLocation.longitude,
            min_distance: parseInt(document.getElementById('distanceMin').value) || 0,
            max_distance: parseInt(document.getElementById('distanceMax').value) || 50,
            min_age: document.getElementById('distanceMinAge').value ? parseInt(document.getElementById('distanceMinAge').value) : undefined,
            max_age: document.getElementById('distanceMaxAge').value ? parseInt(document.getElementById('distanceMaxAge').value) : undefined,
            gender: document.getElementById('distanceGender').value || undefined,
            min_height: document.getElementById('distanceMinHeight').value ? parseInt(document.getElementById('distanceMinHeight').value) : undefined,
            max_height: document.getElementById('distanceMaxHeight').value ? parseInt(document.getElementById('distanceMaxHeight').value) : undefined
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || 'Грешка при търсене');
          return;
        }

        displayDistanceResults(data.results);
      } catch (err) {
        console.error('Search error:', err);
        alert('Грешка при търсене');
      }
    }

    function displayDistanceResults(results) {
      const resultsDiv = document.getElementById('distanceResults');
      const listDiv = document.getElementById('distanceResultsList');
      const countSpan = document.getElementById('distanceCount');

      countSpan.textContent = results.length;

      if (results.length === 0) {
        listDiv.innerHTML = '<p class="text-gray-400 text-center py-8" data-i18n="cs.no_results">Не са намерени резултати</p>';
      } else {
        listDiv.innerHTML = results.map(user => `
          <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
            <div class="flex justify-between items-start mb-3">
              <h4 class="text-lg font-bold text-white">${user.full_name}</h4>
              <span class="text-blue-400 font-semibold">${user.distance_km} км</span>
            </div>
            <div class="space-y-1 text-sm text-gray-300">
              <p>📞 ${user.phone}</p>
              <p>👤 ${user.gender === 'male' ? 'М' : 'Ж'}, ${user.age}г, ${user.height_cm}см</p>
              <p>📍 ${user.city}, ${user.country}</p>
              ${user.current_need ? `<p class="text-yellow-400 mt-2">🔍 Нужда: ${user.current_need}</p>` : ''}
            </div>
          </div>
        `).join('');
      }

      resultsDiv.classList.remove('hidden');
    }

    // Search by need
    async function searchByNeed() {
      if (!needLocation) {
        alert('Моля, разрешете достъп до локация');
        return;
      }

      const need = document.getElementById('needSubcategory').value;
      if (!need) {
        alert('Моля, изберете нужда');
        return;
      }

      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_URL}/search/by-need`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            latitude: needLocation.latitude,
            longitude: needLocation.longitude,
            need: need,
            min_age: document.getElementById('needMinAge').value ? parseInt(document.getElementById('needMinAge').value) : undefined,
            max_age: document.getElementById('needMaxAge').value ? parseInt(document.getElementById('needMaxAge').value) : undefined,
            gender: document.getElementById('needGender').value || undefined,
            city: document.getElementById('needCity').value || undefined,
            min_height: document.getElementById('needMinHeight').value ? parseInt(document.getElementById('needMinHeight').value) : undefined,
            max_height: document.getElementById('needMaxHeight').value ? parseInt(document.getElementById('needMaxHeight').value) : undefined
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || 'Грешка при търсене');
          return;
        }

        displayNeedResults(data.results);
      } catch (err) {
        console.error('Search error:', err);
        alert('Грешка при търсене');
      }
    }

    function displayNeedResults(results) {
      const resultsDiv = document.getElementById('needResults');
      const listDiv = document.getElementById('needResultsList');
      const countSpan = document.getElementById('needCount');

      countSpan.textContent = results.length;

      if (results.length === 0) {
        listDiv.innerHTML = '<p class="text-gray-400 text-center py-8">Не са намерени резултати в радиус 50км</p>';
      } else {
        listDiv.innerHTML = results.map(user => `
          <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
            <div class="flex justify-between items-start mb-3">
              <h4 class="text-lg font-bold text-white">${user.full_name}</h4>
              <span class="text-blue-400 font-semibold">${user.distance_km} км</span>
            </div>
            <div class="space-y-1 text-sm text-gray-300">
              <p>📞 ${user.phone}</p>
              ${user.email ? `<p>📧 ${user.email}</p>` : ''}
              <p>👤 ${user.gender === 'male' ? 'М' : 'Ж'}, ${user.age}г, ${user.height_cm}см</p>
              <p>📍 ${user.city}, ${user.country}</p>
              <div class="bg-gray-700 rounded p-2 mt-2">
                <p class="text-yellow-400 font-semibold">💼 Предлага:</p>
                <p class="text-white">${user.offerings}</p>
              </div>
            </div>
          </div>
        `).join('');
      }

      resultsDiv.classList.remove('hidden');
    }

    // Tab switching
    function showTab(tab) {
      if (tab === 'distance') {
        document.getElementById('distanceSearch').classList.remove('hidden');
        document.getElementById('needSearch').classList.add('hidden');
        document.getElementById('tabDistance').className = 'flex-1 py-3 rounded font-semibold transition-colors bg-blue-600 text-white';
        document.getElementById('tabNeed').className = 'flex-1 py-3 rounded font-semibold transition-colors bg-gray-700 text-gray-300';
      } else {
        document.getElementById('distanceSearch').classList.add('hidden');
        document.getElementById('needSearch').classList.remove('hidden');
        document.getElementById('tabDistance').className = 'flex-1 py-3 rounded font-semibold transition-colors bg-gray-700 text-gray-300';
        document.getElementById('tabNeed').className = 'flex-1 py-3 rounded font-semibold transition-colors bg-blue-600 text-white';
      }
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      getLocation('distance');
      getLocation('need');
      loadServiceCategories();
    });
  </script>

    <script src="/shared/js/i18n.js?v=1.0126"></script>
</body>
</html>
