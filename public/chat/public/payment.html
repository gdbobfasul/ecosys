<!-- Version: 1.0139 -->
<!-- Крипто плащанията са премахнати (работен ред, стъпка 3). Остава само карта (Stripe). -->
<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плащане - Анонимен Чат</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2" data-i18n="cpay.title_h">💳 Плащане</h1>
            <p class="text-gray-400" data-i18n="cpay.choose_method">Плащане с карта</p>
        </div>

        <!-- Payment Options -->
        <div class="bg-gray-800 rounded-lg p-6 space-y-4">
            <!-- Card Payment (Stripe) -->
            <div class="border border-blue-500 rounded-lg p-6 bg-gradient-to-br from-blue-900/20 to-cyan-900/20">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h3 class="text-xl font-bold text-blue-400" data-i18n="cpay.card">💳 Карта</h3>
                        <p class="text-sm text-gray-400">Visa/Mastercard</p>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-bold text-blue-300" id="cardPrice">€5</div>
                        <div class="text-sm text-gray-400" data-i18n="r.82">или $5</div>
                    </div>
                </div>

                <button
                    id="payWithCardBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold"
                 data-i18n="r.55">
                    <span data-i18n="cpay.pay_card">Плати с карта</span>
                </button>
            </div>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage" class="mt-4 text-center hidden">
            <div class="bg-gray-800 rounded p-4">
                <div id="statusText" class="text-gray-300"></div>
            </div>
        </div>

        <!-- Back to Login -->
        <div class="mt-6 text-center">
            <a href="/index.html" class="text-gray-400 hover:text-white text-sm" data-i18n="r.107">
                ← Назад към вход
            </a>
        </div>
    </div>

    <script>
        // Само плащане с карта (Stripe). Крипто плащанията (KCY1/MetaMask) са премахнати.
        const userId = localStorage.getItem('userId');
        const userPhone = localStorage.getItem('userPhone');
        if (!userId) {
            window.location.href = '/index.html';
        }

        // Показва реалната цена според локацията (бекенд: /api/payment/pricing).
        (async function loadPricing() {
            try {
                const r = await fetch('/api/payment/pricing');
                if (r.ok) {
                    const p = await r.json();
                    if (p && p.displayPrice) document.getElementById('cardPrice').textContent = p.displayPrice;
                }
            } catch (e) { /* остава по подразбиране */ }
        })();

        // Плащане с карта (Stripe checkout се закача от бекенда).
        document.getElementById('payWithCardBtn').addEventListener('click', () => {
            showStatus('⏳ Зареждане на плащане с карта...', 'info');
            // Stripe checkout flow се закача тук (бекенд: /api/payment/create-intent + confirm).
        });

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');
            statusText.textContent = message;
            statusDiv.classList.remove('hidden');
            statusDiv.className = 'mt-4 text-center';
            if (type === 'success') statusText.className = 'text-green-400';
            else if (type === 'error') statusText.className = 'text-red-400';
            else if (type === 'warning') statusText.className = 'text-yellow-400';
            else statusText.className = 'text-gray-300';
        }
        function hideStatus() {
            document.getElementById('statusMessage').classList.add('hidden');
        }
    </script>
    <script src="/shared/js/i18n.js?v=1.0126"></script>
</body>
</html>
