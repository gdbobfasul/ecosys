<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="post.title">WhereNoBiz — Липсващ бизнес</title>
  <link rel="stylesheet" href="css/style.css?v=1.0165">
</head>
<body>
  <main class="post-wrap">
    <a href="#" id="backLink" class="back" data-i18n="post.back">← Назад</a>
    <div id="post" class="panel post-card"><div class="loading" data-i18n="post.loading">Зареждам…</div></div>

    <!-- Потвърждение „такъв бизнес НЯМА" (изисква обосновка) -->
    <div id="confirmBox" class="panel" style="display:none">
      <h3 data-i18n="post.confirm_h3">✅ Потвърди: такъв бизнес НЯМА</h3>
      <p class="hint" data-i18n="post.confirm_hint">Това НЕ е „харесва ми". Потвърждаваш, че бизнесът липсва — затова обясни:</p>
      <div class="field">
        <label data-i18n="post.where_label">Къде би могъл да се развие? (градове, места)</label>
        <textarea id="where" rows="2" placeholder="напр. в крайбрежните градове, където има туризъм…" data-i18n-attr="placeholder:post.where_ph"></textarea>
      </div>
      <div class="field">
        <label data-i18n="post.why_label">Защо знаеш, че го няма? (причини)</label>
        <textarea id="why" rows="2" placeholder="напр. бедна страна, малко инвеститори, климат…" data-i18n-attr="placeholder:post.why_ph"></textarea>
      </div>
      <div class="actions">
        <button id="btnConfirm" data-i18n="post.btn_confirm">Потвърждавам, че НЯМА</button>
        <button id="btnDispute" class="ghost" data-i18n="post.btn_dispute">Не съм съгласен (има го)</button>
      </div>
      <div id="confirmMsg" class="msg" style="display:none"></div>
    </div>

    <!-- Доклад -->
    <div id="reportBox" class="panel" style="display:none">
      <h3 data-i18n="post.report_h3">🚩 Докладвай фалшив/нелогичен пост</h3>
      <div class="field"><label data-i18n="post.report_reason_label">Причина</label><input id="repReason" placeholder="напр. в Google има 10 такива фирми в тази страна" data-i18n-attr="placeholder:post.report_reason_ph"></div>
      <div class="field"><label data-i18n="post.report_evidence_label">Доказателство (URL, по избор)</label><input id="repEvidence" placeholder="https://…" data-i18n-attr="placeholder:post.report_evidence_ph"></div>
      <div class="actions"><button id="btnReport" class="ghost" data-i18n="post.btn_report">Подай доклад</button></div>
      <div id="reportMsg" class="msg" style="display:none"></div>
    </div>
  </main>

  <script src="js/i18n.js?v=1.0165"></script>
  <script src="js/wnb-common.js?v=1.0165"></script>
  <script src="js/post.js?v=1.0165"></script>
</body>
</html>
