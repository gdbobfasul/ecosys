<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhereNoBiz — Вход</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="hero small">
    <h1>🌍 WhereNoBiz</h1>
    <p>Влез или се регистрирай, за да потвърждаваш ниши и да постваш.</p>
  </header>

  <main class="form-wrap">
    <div class="panel auth-card">
      <div class="tabs">
        <button id="tabLogin" class="tab on">Вход</button>
        <button id="tabRegister" class="tab">Регистрация</button>
      </div>
      <div id="msg" class="msg" style="display:none"></div>
      <div class="field"><label for="email">Имейл</label><input type="email" id="email" autocomplete="email"></div>
      <div class="field"><label for="password">Парола</label><input type="password" id="password" autocomplete="current-password" placeholder="поне 6 символа"></div>
      <div class="field" id="nameField" style="display:none"><label for="display_name">Име (по избор)</label><input type="text" id="display_name"></div>
      <div class="field" id="phoneField" style="display:none"><label for="phone">Телефон (по избор — за наградата при 1500 потвърждения)</label><input type="tel" id="phone"></div>
      <div class="actions"><button id="btnSubmit">Вход</button></div>
    </div>
  </main>

  <script src="js/wnb-common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
