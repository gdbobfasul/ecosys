<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="login.title">WhereNoBiz — Вход</title>
  <link rel="stylesheet" href="css/style.css?v=1.0165">
</head>
<body>
  <header class="hero small">
    <h1 data-i18n="login.h1">🌍 WhereNoBiz</h1>
    <p data-i18n="login.tagline">Влез или се регистрирай, за да потвърждаваш ниши и да постваш.</p>
  </header>

  <main class="form-wrap">
    <div class="panel auth-card">
      <div class="tabs">
        <button id="tabLogin" class="tab on" data-i18n="tab.login">Вход</button>
        <button id="tabRegister" class="tab" data-i18n="tab.register">Регистрация</button>
      </div>
      <div id="msg" class="msg" style="display:none"></div>
      <div class="field"><label for="email" data-i18n="label.email">Имейл</label><input type="email" id="email" autocomplete="email"></div>
      <div class="field"><label for="password" data-i18n="label.password">Парола</label><input type="password" id="password" autocomplete="current-password" placeholder="поне 6 символа" data-i18n-attr="placeholder:ph.password"></div>
      <div class="field" id="nameField" style="display:none"><label for="display_name" data-i18n="label.name">Име (по избор)</label><input type="text" id="display_name"></div>
      <div class="field" id="phoneField" style="display:none"><label for="phone" data-i18n="label.phone">Телефон (по избор — за наградата при 1500 потвърждения)</label><input type="tel" id="phone"></div>
      <div class="actions"><button id="btnSubmit" data-i18n="btn.submit_login">Вход</button></div>
    </div>
  </main>

  <script src="js/i18n.js?v=1.0165"></script>
  <script src="js/wnb-common.js?v=1.0165"></script>
  <script src="js/auth.js?v=1.0165"></script>
</body>
</html>
