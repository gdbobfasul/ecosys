<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="brch1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7c948"/>
      <stop offset="50%" stop-color="#e8a317"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="brch1Rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="100%" stop-color="#c9930f"/>
    </linearGradient>
  </defs>
  <!-- Outer rim -->
  <circle cx="50" cy="50" r="48" fill="url(#brch1Rim)"/>
  <!-- Inner coin face -->
  <circle cx="50" cy="50" r="42" fill="url(#brch1Grad)"/>
  <!-- Subtle inner ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#fff3b0" stroke-width="0.8" opacity="0.6"/>
  <!-- BRCH1 text -->
  <text x="50" y="46" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="bold"
        fill="#5a3a00" letter-spacing="0.5">BRCH</text>
  <text x="50" y="68" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="bold"
        fill="#5a3a00">1</text>
  <!-- Highlight -->
  <ellipse cx="38" cy="32" rx="14" ry="6" fill="#fff" opacity="0.25"/>
</svg>
