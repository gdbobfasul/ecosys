<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>FPS Hunter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #08120c;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }
    #boot-hint {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #66bb6a;
      font-size: 14px;
      letter-spacing: 3px;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="boot-hint">ЗАРЕЖДАНЕ…</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
