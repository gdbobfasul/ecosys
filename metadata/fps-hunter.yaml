listings:
  ru:
    title: Huntline 3D
    short: "3D шутер от первого лица: 100 уровней охоты, разное оружие"
    full: |
      Huntline 3D — 3D охотничий шутер от первого лица. Двигайся по разным ландшафтам
      (лес, поле, снег, пустыня, холмы, болото, городские руины), процедурно меняющимся
      от уровня к уровню, и поражай цели.

      • На каждом уровне один тип цели, а оружие подбирается под неё автоматически:
        ружьё/винтовка по зверю и солдатам, пистолет по змеям и пугалам, рогатка по
        гномам и шарам, ракетомёт по танку, зенитные ракеты по самолёту.
      • 100 процедурно сгенерированных уровней с монотонно растущей сложностью
        (больше целей, выше скорость и уклончивость, жёстче лимиты времени и патронов).
        Уровни детерминированы — повторяемы.
      • Управление: телефон — левый джойстик движения, перетаскивание справа для обзора,
        кнопка ОГОНЬ; ПК — WASD + мышь, ЛКМ стрельба.
      • Локальный рекорд (SQLite на устройстве). Полностью офлайн, без рекламы и покупок.
  en:
    title: Huntline 3D
    short: "3D first-person shooter: 100 hunting levels, varied weapons"
    full: |
      Huntline 3D is a 3D first-person hunting shooter. Move across varied terrains
      (forest, field, snow, desert, hills, swamp, city ruins) that change procedurally
      level to level, and take down the targets.

      • Each level has one target type, and the weapon is picked automatically to match:
        shotgun/rifle for game and soldiers, pistol for snakes and scarecrows, a stone
        sling for gnomes and balloons, a rocket launcher for the tank, AA rockets for
        the plane.
      • 100 procedurally generated levels with steadily rising difficulty (more targets,
        higher speed and evasiveness, tighter time and ammo limits). Levels are
        deterministic — repeatable.
      • Controls: phone — left movement joystick, drag on the right to look, FIRE button;
        desktop — WASD + mouse, left click to shoot.
      • Local high score (on-device SQLite). Fully offline, no ads, no purchases.
  bg:
    title: Huntline 3D
    short: "3D шутър от първо лице: 100 нива лов, различни оръжия"
    full: |
      Huntline 3D е 3D ловен шутър от първо лице. Движиш се по различни терени (гора,
      поле, сняг, пустиня, хълмове, блато, градски руини), които се менят процедурно по
      ниво, и поразяваш целите.

      • Всяко ниво има един тип цел, а оръжието се избира автоматично спрямо нея: ловна
        пушка/пушка за дивеч и войници, пистолет за змии и плашила, прашка за гноми и
        балони, ракетомет за танк, зенитни ракети за самолет.
      • 100 процедурно генерирани нива с монотонно нарастваща трудност (повече цели,
        по-висока скорост и уклончивост, по-стегнати лимити за време и боеприпаси).
        Нивата са детерминирани — повторяеми.
      • Управление: телефон — ляв джойстик за движение, влачене вдясно за оглеждане,
        бутон ОГЪН; десктоп — WASD + мишка, ляв клик стрелба.
      • Локален рекорд (SQLite на устройството). Напълно офлайн, без реклами и покупки.

