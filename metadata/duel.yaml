listings:
  ru:
    title: Дуэль на ринге
    short: Пошаговый фэнтези-поединок 1 на 1, угадай комбо — 10 уровней
    full: |
      Дуэль на ринге — пошаговый фэнтези-поединок один на один с видео-анимациями
      героев. На каждом уровне тебе достаётся случайный герой (мечник, маг, женщина-змея,
      молотобоец) на анимированной лесной арене.

      • Обычные удары — кнопки V/B (урон 0–20%).
      • Спецудар: у каждого героя свои 6 клавиш; угадай скрытую комбинацию из 4 (в любом
        порядке) и нанеси мощный удар. На телефоне всё управление — касанием экранных кнопок.
      • 10 уровней. Рекорд хранится локально.
      • Полностью офлайн и бесплатно: движок и видео встроены в приложение. Без рекламы,
        покупок, аккаунтов и трекинга.
  en:
    title: Ring Duel
    short: Turn-based 1v1 fantasy duel, guess the combo — 10 levels
    full: |
      Ring Duel is a turn-based one-on-one fantasy duel with video-animated heroes. Each
      level gives you a random hero (swordsman, mage, snake-woman, hammer fighter) on a
      living animated forest arena.

      • Normal hits — the V/B buttons (0–20% damage).
      • Special attack: each hero has its own 6 keys; guess the hidden 4-combination (in
        any order) to land a heavy blow. On phone everything is played by tapping the
        on-screen buttons.
      • 10 levels. Your best score is kept locally.
      • Fully offline and free: the engine and videos are embedded in the app. No ads, no
        purchases, no accounts, no tracking.
  bg:
    title: Pupikes Ring Clash
    short: Походова фентъзи битка 1 срещу 1, познай комбото — 10 нива
    full: |
      Pupikes Ring Clash е походова фентъзи битка един срещу един с видео-анимации на героите.
      На всяко ниво получаваш произволен герой (мечоносец, магьосник, змийска жена, чукар)
      на жив анимиран горски ринг.

      • Обикновени удари — бутоните V/B (0–20% щета).
      • Специален удар: всеки герой има свои 6 клавиша; познай скритата комбинация от 4
        (в произволен ред) и нанеси силен удар. На телефон всичко се играе с докосване на
        екранните бутони.
      • 10 нива. Рекордът се пази локално.
      • Напълно офлайн и безплатно: движокът и видеата са вградени в приложението. Без
        реклами, покупки, акаунти и трекинг.

permissions: []
# Приложението не изисква специални разрешения (офлайн игра). В манифеста стои само
# стандартното за Capacitor android.permission.INTERNET, но играта не ползва мрежа —
# всички видео-анимации са вградени локално.

data_safety:
