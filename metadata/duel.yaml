  feature_graphic: 1024x500 (Google Play)
  screenshots: мин. 2-3 (дуел на ринга, комбо бутони, специален удар)

keywords: [дуел, duel, файтинг, turn-based, походова битка, фентъзи, combo, offline, без интернет]
