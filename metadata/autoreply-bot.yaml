id: autoreply-bot
name: Pupikes Auto Answer
folders:
  - rustore/autoreply-bot
  - huawei/autoreply-bot
stores: [rustore, huawei]
package:
  rustore: com.pupikes.autoreplybot.rustore
  huawei:  com.pupikes.autoreplybot.huawei
category:
  google_play: Tools
  rustore: Инструменты
  huawei: Tools
content_rating: "3+ (Everyone) — без насилие, без реклами, без покупки; целият текст е създаден от потребителя локално (sandbox)"
pricing: free
contains_ads: false
in_app_purchases: false
default_language: ru
supported_languages: [bg, ru, uk, en, de, fr, es, es-MX, it, pt, ar, hi, ja, ky, zh-Hant]
privacy_policy: https://bgmasters.net/legal/privacy
support_email: ltd.dai.grup@gmail.com
website: https://bgmasters.net

listings:
  ru:
    title: Pupikes Auto Answer
    short: Робот, который автоотвечает на сообщения по правилам — офлайн, в песочнице
    full: |
      Pupikes Auto Answer — «робот в аренду», который автоматически отвечает на сообщения
      по вашим правилам, полностью на устройстве. Без интернета, без контактов, без
      доступа к SMS, без аккаунтов и без отслеживания.

      • Правила: ключевое слово → ответ, приветствие и резервный ответ.
      • Расписание (рабочие часы) — отвечать круглосуточно или только в заданное время.
      • Встроенный демо-чат (Demo Inbox): здесь робот реально отвечает, и вы тестируете правила.
      • Локальные уведомления о новых сообщениях.
      • Каналы мессенджеров показаны честно как «требуют native» — мы не имитируем отправку.
      Android не разрешает сторонним приложениям автоматизировать чужие мессенджеры/SMS,
      поэтому робот работает в собственной песочнице внутри приложения.
  en:
    title: Pupikes Auto Answer
    short: A robot that auto-replies to messages by rules — offline, sandboxed
    full: |
      Pupikes Auto Answer is a "robot for rent" that automatically answers messages by your
      rules, entirely on-device. No internet, no contacts, no SMS access, no accounts,
      no tracking.

      • Rules: keyword to answer, greeting and a fallback reply.
      • Schedule (office hours): reply 24/7 or only within a chosen window.
      • Built-in Demo Inbox where the robot actually replies so you can test the rules.
      • Local notifications for new messages.
      • Messenger channels are shown honestly as "native required" — we never fake sending.
      Android does not let third-party apps automate other messengers/SMS, so the robot
      runs inside its own sandbox in the app.
  bg:
    title: Pupikes Auto Answer
    short: Робот, който авто-отговаря на съобщения по правила — офлайн, в пясъчник
    full: |
      Pupikes Auto Answer е „робот под наем", който автоматично отговаря на съобщения по
      твои правила, изцяло на устройството. Без интернет, без контакти, без достъп до
      SMS, без акаунти и без проследяване.

      • Правила: ключова дума → отговор, поздрав и резервен отговор.
      • Разписание (работно време): отговаряй 24/7 или само в избран интервал.
      • Вграден Demo Inbox, където роботът реално отговаря — тестваш правилата.
      • Локални известия за нови съобщения.
      • Каналите към месинджъри са показани честно като „изискват native" — не имитираме изпращане.
      Android не позволява на трети приложения да автоматизират чужди месинджъри/SMS,
      затова роботът работи в собствен пясъчник вътре в приложението.

permissions:
  - id: POST_NOTIFICATIONS (@capacitor/local-notifications)
    why: Локални известия за нови съобщения в симулирания вход (Demo Inbox). Незадължително — приложението работи и без тях.
  - id: android.permission.INTERNET
    why: Стандартно разрешение на Capacitor WebView обвивката. Приложението не прави мрежови заявки — работи изцяло офлайн.

data_safety:
  collects_personal_data: false
  data_stored:
    - Правила, поздрав/резервен отговор, разписание и симулираните съобщения — само локално (localStorage)
  shared_with_third_parties: none
  encrypted_in_transit: not_applicable   # няма мрежови трансфер
  encrypted_at_rest: false
  user_can_delete: true                  # триене/нулиране на правила и история в приложението
  account_required: false

assets:
  icon: 512x512 PNG (робот/чат мотив, синя тема #3a7afe)
  feature_graphic: 1024x500 (Google Play)
  screenshots: мин. 2 (Правила, Табло ON/OFF, Demo Inbox)

keywords: [auto-reply, bot, autoresponder, rules, offline, sandbox, notifications, no tracking]
