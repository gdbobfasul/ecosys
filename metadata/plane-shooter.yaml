  - huawei/plane-shooter
stores: [rustore, huawei]
package:
  rustore: com.kcy.planeshooter.rustore
  huawei:  com.kcy.planeshooter.huawei
category:
  google_play: Games / Arcade
  rustore: Игры
  huawei: Games
content_rating: "3+ (Everyone) — класически аркаден самолетен шутър, без кръв, без реклами"
pricing: free
contains_ads: false
in_app_purchases: false
default_language: ru
