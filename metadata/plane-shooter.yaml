listings:
  ru:
    title: Warbird Rush
    short: "Аркадный самолётный шутёр: 3 оружия, боссы, 10 уровней"
    full: |
      Warbird Rush — классический 2D аркадный самолётный шутёр. Управляй маленьким
      самолётом пальцем (перетаскивание), стрельба автоматическая. Уворачивайся от врагов,
      собирай очки и проходи уровни.

      • 3 оружия, открываются по мере прогресса: пули → бомбы (урон по площади) →
        самонаводящиеся ракеты. Кнопка ⚔ переключает активное оружие.
      • Ровно 10 уровней с растущей сложностью, боссы на 5-м и 10-м уровнях.
      • Power-up капсулы, частицы, параллакс-фон из звёзд, очки, здоровье и жизни, HUD.
      • Полностью офлайн: вся графика в коде, без рекламы и покупок. Рекорды хранятся
        только на устройстве.
  en:
    title: Warbird Rush
    short: "Arcade plane shooter: 3 weapons, bosses, 10 levels"
    full: |
      Warbird Rush is a classic 2D arcade plane shooter. Steer a small plane with your
      finger (drag), firing is automatic. Dodge enemies, rack up points and clear levels.

      • 3 weapons unlocked as you progress: bullets → bombs (area damage) → homing
        missiles. The ⚔ button switches the active weapon.
      • Exactly 10 levels of rising difficulty, with bosses on level 5 and level 10.
      • Power-up capsules, particles, a parallax starfield, score, health and lives, HUD.
      • Fully offline: all graphics are in code, no ads, no purchases. High scores stay
        on your device only.
  bg:
    title: Warbird Rush
    short: "Аркаден самолетен шутър: 3 оръжия, босове, 10 нива"
    full: |
      Warbird Rush е класически 2D аркаден самолетен шутър. Управляваш малък самолет с
      пръст (влачене), огънят е автоматичен. Избягвай враговете, трупай точки и минавай
      нивата.

      • 3 оръжия, отключват се с прогреса: куршуми → бомби (площна щета) → самонасочващи
        се ракети. Бутонът ⚔ сменя активното оръжие.
      • Точно 10 нива с нарастваща трудност, босове на 5-то и 10-то ниво.
      • Power-up капсули, частици, паралакс звезден фон, точки, здраве и животи, HUD.
      • Напълно офлайн: цялата графика е в кода, без реклами и покупки. Рекордите се
        пазят само на устройството.

permissions: []
# Приложението не изисква специални разрешения (офлайн игра). В манифеста стои само
# стандартното за Capacitor android.permission.INTERNET, но играта не ползва мрежа.

data_safety:
  collects_personal_data: false
  data_stored:
    - Локален рекорд/прогрес (име по избор + точки) — само в localStorage на устройството
  shared_with_third_parties: none
  encrypted_in_transit: not_applicable
  encrypted_at_rest: false
  user_can_delete: true
  account_required: false

assets:
  icon: 512x512 PNG (самолет + звезден фон)
  feature_graphic: 1024x500 (Google Play)
  screenshots: мин. 2-3 (геймплей с врагове, бос, смяна на оръжие)

keywords: [plane shooter, самолет, шутър, аркада, shmup, arcade, shooter, offline, без интернет]
