id: dodge-master
name: EvadeArena
folders:
  - rustore/dodge-master
  - huawei/dodge-master
stores: [rustore, huawei]
package:
  rustore: com.pupikes.dodgemaster.rustore
  huawei:  com.pupikes.dodgemaster.huawei
category:
  google_play: Games / Arcade
  rustore: Игры
  huawei: Games
content_rating: "3+ (Everyone) — аркада за избягване, без насилие/кръв, без реклами"
pricing: free
contains_ads: false
in_app_purchases: false
default_language: ru
supported_languages: [bg, ru, uk, en, de, fr, es, es-MX, it, pt, ar, hi, ja, ky, zh-Hant]
privacy_policy: https://bgmasters.net/legal/privacy
