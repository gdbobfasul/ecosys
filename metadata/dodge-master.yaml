listings:
  ru:
    title: EvadeArena
    short: Уворачивайся от летящих снарядов и выживай — 10 уровней
    full: |
      EvadeArena — динамичная аркада-уворачивание с видом сверху. Ты стоишь на поле,
      а со всех сторон летят старинные снаряды: камешки, стрелы, камни, грязь, горшки,
      овощи, снежки, палки и самонаводящиеся камни. Двигайся свободно и уворачивайся!

      • Управление: WASD/стрелки на ПК или виртуальный джойстик (коснись и веди) на
        телефоне.
      • 10 уровней растущей сложности: дольше выживать, чаще огонь, больше направлений,
        выше скорость снарядов и более тяжёлые схемы (одиночный → залп → кольцо → навес).
      • Уровень пройден, когда ты продержался отведённое время.
      • Полностью офлайн: вся графика сгенерирована в коде, без рекламы и покупок.
        Рекорды хранятся только на устройстве.
  en:
    title: EvadeArena
    short: Dodge the incoming projectiles and survive — 10 levels
    full: |
      EvadeArena is a fast top-down dodge-and-survive arcade game. You stand in the
      field while old-school projectiles fly in from every side: pebbles, arrows, rocks,
      mud, pots, vegetables, snowballs, sticks and homing stones. Move freely and dodge!

      • Controls: WASD/arrows on desktop, or a virtual joystick (touch and drag) on phone.
      • 10 levels of rising difficulty: survive longer, faster fire, more directions at
        once, higher projectile speed and heavier patterns (single → volley → ring → lob).
      • Clear a level by surviving the required time.
      • Fully offline: all graphics are generated in code, no ads, no purchases. High
        scores stay on your device only.
  bg:
    title: EvadeArena
    short: Избягвай летящите снаряди и оцелявай — 10 нива
    full: |
      EvadeArena е динамична аркада за избягване с изглед отгоре. Стоиш на полето, а
      от всички страни летят старовремски снаряди: камъчета, стрели, камъни, кал, гърнета,
      зеленчуци, снежни топки, пръчки и самонасочващи се камъни. Движи се свободно и ги
      избягвай!

      • Управление: WASD/стрелки на десктоп или виртуален джойстик (докосни и влачи) на
        телефон.
      • 10 нива с нарастваща трудност: по-дълго оцеляване, по-чест огън, повече посоки
        наведнъж, по-бързи снаряди и по-тежки шаблони (единичен → залп → пръстен → дъга).
      • Минаваш ниво, когато оцелееш отреденото време.
      • Напълно офлайн: цялата графика е генерирана в кода, без реклами и покупки.
        Рекордите се пазят само на устройството.

permissions: []
# Приложението не изисква специални разрешения (офлайн игра). В манифеста стои само
# стандартното за Capacitor android.permission.INTERNET, но играта не ползва мрежа.

data_safety:
  collects_personal_data: false
  data_stored:
    - Локален рекорд/прогрес (име по избор + точки) — само в localStorage на устройството
  shared_with_third_parties: none
  encrypted_in_transit: not_applicable
  encrypted_at_rest: false
  user_can_delete: true
  account_required: false

assets:
  icon: 512x512 PNG (герой + летящи снаряди, тъмен фон)
  feature_graphic: 1024x500 (Google Play)
  screenshots: мин. 2-3 (арена с летящи снаряди, HUD с джойстик, екран победа/край)

keywords: [dodge, избягване, аркада, оцеляване, survival, arcade, top-down, offline, без интернет]
