  huawei:  com.kcy.babymonitor.huawei
category:
  google_play: Parenting
  rustore: Дети
  huawei: Education
content_rating: "3+ (Everyone) — помощно средство за родители, без насилие/реклами/покупки; НЕ е сертифицирано устройство за безопасност"
pricing: free
contains_ads: false
in_app_purchases: false
default_language: ru
