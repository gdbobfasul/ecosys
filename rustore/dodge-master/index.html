<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Dodge Master</title>
  <style>
    /* Цял екран, без скрол, тъмен фон зад canvas-а */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0d08;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #game {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Зареждащ надпис докато Phaser стартира */
    #boot-hint {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0b34a;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="boot-hint">ЗАРЕЖДАНЕ…</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
