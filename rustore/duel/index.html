<!doctype html>
<!-- Version: 1.0001 -->
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Дуел на ринга</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #06060a; color: #e8d6a5;
      overflow: hidden; overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent; user-select: none;
      font-family: "Cormorant Garamond", Georgia, serif;
    }
    /* Арената заема целия екран; движокът сам скалира полето 1280×960 (letterbox). */
    #arena {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
    }
    #boot-hint {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #c0392b; font-size: 16px; letter-spacing: 3px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="arena"></div>
  <div id="boot-hint">ЗАРЕЖДАНЕ…</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
