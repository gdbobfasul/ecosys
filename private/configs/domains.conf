# ═══════════════════════════════════════════════════════════════════════════
# KCY — ЕДИНСТВЕНА конфигурация за домейни и директории.
#
# ⚠️ ВСИЧКИ скриптове по nginx/домейни ЧЕТАТ оттук (sourceват този файл):
#     05-server-install.sh · 08-setup-domain.sh · 18-…hlb… · 19-…wnb…
# Смяна на домейн/директория/порт → редактирай САМО ТОЗИ ФАЙЛ → пусни
# съответната меню опция. Никакъв друг скрипт не се пипа.
#
# Това е bash-source файл (KEY="value"). Без интервали около "=".
# ═══════════════════════════════════════════════════════════════════════════

# ── Главен домейн (цялата екосистема) + имейл за Let's Encrypt SSL ──
MAIN_DOMAIN="take.offbitch.com"
SSL_EMAIL="admin@${MAIN_DOMAIN}"

# ── Дефиниции на приложенията ──
#   _DIR = URL пътят (за redirect/serve)   |   _FS = ДИСКОВАТА папка под /var/www/html
#   _PORT = backend порт                   |   _API = api префикс
#   Внимание: URL ≠ дискова папка! напр. URL /houselookbook/ → диск House-Look-Book.
APP_chat_DIR="/chat/public/";   APP_chat_FS="chat/public";    APP_chat_PORT="3000";    APP_chat_API="/api/"
APP_hlb_DIR="/houselookbook/";  APP_hlb_FS="House-Look-Book"; APP_hlb_PORT="3010";     APP_hlb_API="/api/hlb/"
APP_wnb_DIR="/wherenobiz/";     APP_wnb_FS="WhereNoBiz";      APP_wnb_PORT="3011";     APP_wnb_API="/api/wnb/"
APP_eco3_DIR="/eco-3/";         APP_eco3_FS="eco-3";          APP_eco3_PORT="3001";    APP_eco3_API="/api/eco3/"
APP_portals_DIR="/portals/";    APP_portals_FS="portals";    APP_portals_PORT="3002"; APP_portals_API="/api/portals/"

# ── Отделни домейни → приложение (всеки домейн показва САМО това приложение) ──
#    Формат: "<домейн> <ключ>" по един на ред. За чат може няколко домейна.
APP_DOMAIN_MAP="
find.jwork.ru wnb
look.myhousesetup.com hlb
kaji.kak.si chat
gofor.dateeasily.com chat
"
